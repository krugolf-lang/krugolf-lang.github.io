<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เรียน Python แบบโต้ตอบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#16192a;--bg3:#1e2235;--bg4:#252a40;
  --acc:#6c63ff;--acc2:#8b85ff;--acc3:#b3b0ff;
  --grn:#22c55e;--grn2:#4ade80;--amb:#f59e0b;--red:#ef4444;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#5a6a85;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.12);
  --code:#0d1117;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--txt);font-size:17px;line-height:1.8;min-height:100vh}

/* TOP BAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo-txt{font-size:16px;font-weight:700;color:var(--acc3);margin-right:12px;white-space:nowrap}
.instructor-info{display:flex;flex-direction:column;gap:1px;padding-left:14px;margin-right:8px;border-left:1px solid var(--bdr2);line-height:1.3}
.instr-name{font-size:13px;font-weight:600;color:var(--txt)}
.instr-school{font-size:11px;color:var(--txt3)}
.search-wrap{flex:1;min-width:140px;max-width:240px}
.search-wrap input{width:100%;padding:8px 14px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;color:var(--txt);font-size:14px;font-family:'Sarabun',sans-serif;outline:none}
.search-wrap input:focus{border-color:var(--acc)}
.search-wrap input::placeholder{color:var(--txt3)}
.progress-info{font-size:14px;color:var(--txt3);margin-left:auto;white-space:nowrap}
.prog-bar{width:70px;height:4px;background:var(--bg4);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--grn));border-radius:4px;transition:width .4s}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 56px)}

/* SIDEBAR */
.sidebar{width:250px;min-width:250px;background:var(--bg2);border-right:1px solid var(--bdr);padding:8px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px);align-self:flex-start}
.cat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--txt3);padding:14px 16px 6px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:14px;color:var(--txt2);transition:all .12s;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:rgba(108,99,255,.12);color:var(--acc3);border-left-color:var(--acc)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--bdr2);flex-shrink:0;transition:background .3s}
.nav-item.done .nav-dot{background:var(--grn)}
.nav-num{font-size:10px;color:var(--txt3);min-width:16px}

/* CONTENT */
.content{flex:1;padding:40px;max-width:960px;min-width:0;margin:0 auto}

/* CHAPTER */
.ch-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--bdr)}
.ch-num{width:52px;height:52px;border-radius:12px;background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--acc2);flex-shrink:0}
.ch-title{font-size:26px;font-weight:700;color:#fff;line-height:1.2}
.ch-sub{font-size:15px;color:var(--txt3);margin-top:4px}
h3{font-size:18px;font-weight:600;color:var(--txt);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
h3::before{content:'';width:3px;height:13px;background:var(--acc);border-radius:2px;flex-shrink:0}
p{color:var(--txt2);margin-bottom:12px;font-size:16px}
code{font-family:'JetBrains Mono',monospace;font-size:13.5px;background:var(--bg3);color:var(--acc3);padding:2px 7px;border-radius:4px}
strong{color:var(--txt);font-weight:600}

/* CODE BLOCK */
.cb{background:var(--code);border:1px solid var(--bdr2);border-radius:10px;overflow:hidden;margin:12px 0}
.cb-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--bdr)}
.cb-lang{font-size:11px;font-weight:600;color:var(--acc2);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px}
.cb-lang::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--acc)}
.cb-copy{font-size:11px;color:var(--txt3);background:none;border:1px solid var(--bdr2);border-radius:5px;padding:3px 10px;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s}
.cb-copy:hover{border-color:var(--acc);color:var(--acc2)}
.cb-copy.ok{color:var(--grn);border-color:var(--grn)}
pre{padding:18px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:14.5px;line-height:1.75;color:#abb2bf}

/* OUTPUT */
.out{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:12px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--grn2);white-space:pre-wrap}
.out-lbl{font-size:10px;font-weight:600;color:var(--grn);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'Sarabun',sans-serif}

/* CALLOUTS */
.tip,.warn,.note{border-radius:8px;padding:12px 16px;margin:14px 0;font-size:15px;display:flex;gap:10px;align-items:flex-start}
.tip{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);color:var(--acc3)}
.warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.note{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);color:#93c5fd}

/* TABLES */
.tbl{overflow-x:auto;margin:12px 0}
table{width:100%;border-collapse:collapse;font-size:15px}
th{background:var(--bg3);color:var(--acc3);font-weight:600;padding:10px 14px;text-align:left;font-size:14px}
td{padding:10px 14px;border-top:1px solid var(--bdr);color:var(--txt2)}
tr:hover td{background:rgba(255,255,255,.015)}

/* QUIZ */
.quiz{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;overflow:hidden;margin:18px 0}
.quiz-hdr{padding:10px 16px;background:rgba(108,99,255,.08);border-bottom:1px solid rgba(108,99,255,.15);font-size:13px;font-weight:600;color:var(--acc3);display:flex;align-items:center;gap:8px}
.quiz-body{padding:16px}
.quiz-q{font-size:16px;color:var(--txt);margin-bottom:14px;font-weight:500}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{padding:11px 16px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;cursor:pointer;font-size:15px;color:var(--txt2);transition:all .15s;text-align:left;width:100%;font-family:'Sarabun',sans-serif}
.quiz-opt:hover{border-color:var(--acc2);color:var(--txt)}
.quiz-opt.correct{background:rgba(34,197,94,.1);border-color:var(--grn);color:var(--grn2)}
.quiz-opt.wrong{background:rgba(239,68,68,.08);border-color:var(--red);color:#fca5a5}
.quiz-opt:disabled{cursor:default}
.quiz-fb{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;display:none}
.quiz-fb.show{display:block}
.quiz-fb.ok{background:rgba(34,197,94,.1);color:var(--grn2);border:1px solid rgba(34,197,94,.2)}
.quiz-fb.bad{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}

/* ── EDITOR ── */
.editor-wrap{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;overflow:hidden;margin:20px 0}
.editor-topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(108,99,255,.08);border-bottom:1px solid rgba(108,99,255,.2)}
.editor-label{font-size:14px;font-weight:600;color:var(--acc3)}
.editor-actions{display:flex;gap:7px;align-items:center}
.pyodide-status{font-size:11px;color:var(--txt3);display:flex;align-items:center;gap:5px}
.py-dot{width:6px;height:6px;border-radius:50%;background:var(--amb);flex-shrink:0;transition:background .4s;animation:blink 1.2s ease-in-out infinite}
.py-dot.ready{background:var(--grn);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-reset{background:none;border:1px solid var(--bdr2);color:var(--txt3);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Sarabun',sans-serif;transition:all .15s}
.btn-reset:hover{border-color:var(--acc);color:var(--acc3)}
.btn-run{background:var(--acc);border:none;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;font-family:'Sarabun',sans-serif;transition:all .15s}
.btn-run:hover:not(:disabled){background:var(--acc2)}
.btn-run:disabled{opacity:.45;cursor:not-allowed}
.editor-body{display:flex;position:relative}
.line-nums{background:#0a0c14;padding:16px 8px 16px 6px;font-family:'JetBrains Mono',monospace;font-size:14.5px;line-height:1.75;color:var(--txt3);text-align:right;user-select:none;min-width:38px;border-right:1px solid var(--bdr);overflow:hidden;flex-shrink:0}
.code-ta{flex:1;background:var(--code);border:none;outline:none;padding:16px 14px 16px 12px;font-family:'JetBrains Mono',monospace;font-size:14.5px;line-height:1.75;color:#abb2bf;resize:vertical;min-height:120px;caret-color:var(--acc2);tab-size:4;-moz-tab-size:4;white-space:pre;overflow-wrap:normal;overflow-x:auto}
.code-ta::selection{background:rgba(108,99,255,.35)}
.out-area{border-top:1px solid var(--bdr);background:#070a0f}
.out-bar{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;padding:6px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;font-family:'Sarabun',sans-serif}
.clear-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:11px;font-family:'Sarabun',sans-serif;padding:0}
.clear-btn:hover{color:var(--red)}
.run-out{padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7;min-height:42px;white-space:pre-wrap;word-break:break-all}
.run-out.idle{color:var(--txt3);font-style:italic}
.run-out.ok{color:var(--grn2)}
.run-out.err{color:#f87171}

/* BOTTOM NAV */
.bn{display:flex;justify-content:space-between;align-items:center;padding:22px 0 0;border-top:1px solid var(--bdr);margin-top:28px;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--bdr2);color:var(--txt2);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:15px;font-family:'Sarabun',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--acc);color:var(--acc3)}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.pri:hover{background:var(--acc2)}
.btn.inv{opacity:0;pointer-events:none}

/* DONE */
.done-wrap{margin-top:14px;display:flex;justify-content:flex-end}
.btn-done{background:none;border:1px solid var(--bdr2);color:var(--txt3);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Sarabun',sans-serif;transition:all .15s}
.btn-done:hover{border-color:var(--grn);color:var(--grn2)}
.btn-done.marked{border-color:var(--grn);color:var(--grn2)}

/* INDEX */
.idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:20px}
.idx-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s}
.idx-card:hover{border-color:var(--acc);background:var(--bg3)}
.idx-card.done-card{border-color:rgba(34,197,94,.3)}
.idx-num{font-size:12px;color:var(--txt3);margin-bottom:4px}
.idx-name{font-size:15px;font-weight:500;color:var(--txt)}
.idx-tag{font-size:10px;margin-top:5px;color:var(--grn);display:none}
.idx-card.done-card .idx-tag{display:block}

@media(max-width:700px){.sidebar{width:190px;min-width:190px}.content{padding:20px 16px}}
@media(max-width:540px){.sidebar{display:none}.content{padding:16px}.instructor-info{display:none}}
@media(max-width:780px){.search-wrap{display:none}}
</style>
</head>

1:"<div class=\"ch-header\"><div class=\"ch-num\">\u2699\ufe0f</div><div><div class=\"ch-title\">\u0e15\u0e34\u0e14\u0e15\u0e31\u0e49\u0e07 Python</div><div class=\"ch-sub\">Setup & First Program</div></div></div><h3>\u0e02\u0e31\u0e49\u0e19\u0e15\u0e2d\u0e19\u0e15\u0e34\u0e14\u0e15\u0e31\u0e49\u0e07</h3><p>1. \u0e44\u0e1b\u0e17\u0e35\u0e48 <strong>python.org/downloads</strong> \u0e41\u0e25\u0e49\u0e27\u0e14\u0e32\u0e27\u0e19\u0e4c\u0e42\u0e2b\u0e25\u0e14\u0e40\u0e27\u0e2d\u0e23\u0e4c\u0e0a\u0e31\u0e19\u0e25\u0e48\u0e32\u0e2a\u0e38\u0e14</p><p>2. \u0e15\u0e34\u0e14\u0e15\u0e31\u0e49\u0e07 \u2014 Windows \u0e43\u0e2b\u0e49\u0e15\u0e34\u0e4a\u0e01 <strong style='color:var(--grn)'>\u2713 Add Python to PATH</strong> \u0e14\u0e49\u0e27\u0e22!</p><p>3. \u0e40\u0e1b\u0e34\u0e14 Terminal \u0e41\u0e25\u0e49\u0e27\u0e1e\u0e34\u0e21\u0e1e\u0e4c:</p><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Terminal</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>python --version</pre></div><h3>\u0e42\u0e1b\u0e23\u0e41\u0e01\u0e23\u0e21\u0e41\u0e23\u0e01</h3><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>print(\"Hello, World!\")\nprint(\"\u0e2a\u0e27\u0e31\u0e2a\u0e14\u0e35 Python!\")</pre></div><div class=\"out\"><div class=\"out-lbl\">\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</div>Hello, World!\n\u0e2a\u0e27\u0e31\u0e2a\u0e14\u0e35 Python!</div><h3>IDE \u0e17\u0e35\u0e48\u0e41\u0e19\u0e30\u0e19\u0e33</h3><div class=\"tbl\"><table><thead><tr><th>IDE</th><th>\u0e40\u0e2b\u0e21\u0e32\u0e30\u0e01\u0e31\u0e1a</th></tr></thead><tbody><tr><td>VS Code</td><td>\u0e17\u0e31\u0e48\u0e27\u0e44\u0e1b / \u0e1c\u0e39\u0e49\u0e40\u0e23\u0e34\u0e48\u0e21\u0e15\u0e49\u0e19</td></tr><tr><td>PyCharm</td><td>\u0e42\u0e1b\u0e23\u0e40\u0e08\u0e01\u0e15\u0e4c\u0e43\u0e2b\u0e0d\u0e48</td></tr><tr><td>Google Colab</td><td>\u0e2d\u0e2d\u0e19\u0e44\u0e25\u0e19\u0e4c \u0e44\u0e21\u0e48\u0e15\u0e49\u0e2d\u0e07\u0e15\u0e34\u0e14\u0e15\u0e31\u0e49\u0e07</td></tr><tr><td>Replit</td><td>\u0e2d\u0e2d\u0e19\u0e44\u0e25\u0e19\u0e4c \u0e40\u0e23\u0e34\u0e48\u0e21\u0e40\u0e23\u0e47\u0e27</td></tr></tbody></table></div>",
2:"<div class=\"ch-header\"><div class=\"ch-num\">📤</div><div><div class=\"ch-title\">แสดงผลข้อมูล</div><div class=\"ch-sub\">print() & Output</div></div></div><h3>print() พื้นฐาน</h3><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">คัดลอก</button></div><pre>print(\"สวัสดี!\")\nprint(42)\nprint(3.14)\nprint(True)</pre></div><div class=\"out\"><div class=\"out-lbl\">ผลลัพธ์</div>สวัสดี!\n42\n3.14\nTrue</div><h3>print() หลายค่า + sep, end</h3><p>เราใส่หลายค่าใน print() ได้ โดยคั่นด้วยจุลภาค (,) ปกติ Python จะคั่นแต่ละค่าด้วย<strong>ช่องว่าง 1 ตัว</strong> และขึ้นบรรทัดใหม่เมื่อจบ เราปรับได้ด้วย 2 พารามิเตอร์:</p><div class=\"tbl\"><table><thead><tr><th>พารามิเตอร์</th><th>ความหมาย</th><th>ค่าเริ่มต้น</th></tr></thead><tbody><tr><td><code>sep</code></td><td>ตัวคั่นระหว่างค่าแต่ละตัว (separator)</td><td>ช่องว่าง <code>\" \"</code></td></tr><tr><td><code>end</code></td><td>สิ่งที่พิมพ์ต่อท้ายเมื่อจบ print()</td><td>ขึ้นบรรทัดใหม่ <code>\"\\n\"</code></td></tr></tbody></table></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">คัดลอก</button></div><pre>print(\"ชื่อ:\", \"สมชาย\")\nprint(1, 2, 3, sep=\"-\")\nprint(\"A\", end=\" | \")\nprint(\"B\")</pre></div><div class=\"out\"><div class=\"out-lbl\">ผลลัพธ์</div>ชื่อ: สมชาย\n1-2-3\nA | B</div><h3>f-string (แนะนำ)</h3><p><strong>f-string</strong> คือวิธีสร้างข้อความที่แทรกค่าตัวแปรเข้าไปได้โดยตรง เพียงใส่ <code>f</code> นำหน้าเครื่องหมายคำพูด แล้วใส่ชื่อตัวแปรหรือนิพจน์ไว้ใน<strong>วงเล็บปีกกา</strong> <code>{ }</code> Python จะแทนค่าให้อัตโนมัติ เป็นวิธีที่อ่านง่ายและนิยมใช้มากที่สุด</p><div class=\"tbl\"><table><thead><tr><th>การเขียน</th><th>ความหมาย</th></tr></thead><tbody><tr><td><code>f\"...{name}...\"</code></td><td>แทนค่าตัวแปร name ลงในข้อความ</td></tr><tr><td><code>f\"{a + b}\"</code></td><td>คำนวณนิพจน์ในวงเล็บแล้วแสดงผล</td></tr><tr><td><code>f\"{3.14159:.2f}\"</code></td><td>จัดรูปแบบทศนิยม 2 ตำแหน่ง → 3.14</td></tr></tbody></table></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">คัดลอก</button></div><pre>name = \"นิดา\"\nage = 17\nprint(f\"ชื่อ: {name}, อายุ: {age} ปี\")\nprint(f\"pi = {3.14159:.2f}\")</pre></div><div class=\"out\"><div class=\"out-lbl\">ผลลัพธ์</div>ชื่อ: นิดา, อายุ: 17 ปี\npi = 3.14</div><div class=\"quiz\"><div class=\"quiz-hdr\"><span>🧠</span>ทดสอบความเข้าใจ</div><div class=\"quiz-body\"><div class=\"quiz-q\">ผลลัพธ์ของ print(1, 2, 3, sep=\"*\") คืออะไร?</div><div class=\"quiz-opts\"><button class=\"quiz-opt\" onclick=\"ans(this,false)\">A. 1 2 3</button><button class=\"quiz-opt\" onclick=\"ans(this,true)\">B. 1*2*3</button><button class=\"quiz-opt\" onclick=\"ans(this,false)\">C. 123</button><button class=\"quiz-opt\" onclick=\"ans(this,false)\">D. 1,2,3</button></div><div class=\"quiz-fb\"></div></div></div>",
3:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udcac</div><div><div class=\"ch-title\">\u0e2b\u0e21\u0e32\u0e22\u0e40\u0e2b\u0e15\u0e38</div><div class=\"ch-sub\">Comment</div></div></div><p>Comment \u0e04\u0e37\u0e2d\u0e02\u0e49\u0e2d\u0e04\u0e27\u0e32\u0e21\u0e17\u0e35\u0e48 Python \u0e44\u0e21\u0e48\u0e1b\u0e23\u0e30\u0e21\u0e27\u0e25\u0e1c\u0e25 \u0e43\u0e0a\u0e49\u0e2d\u0e18\u0e34\u0e1a\u0e32\u0e22\u0e42\u0e04\u0e49\u0e14</p><h3>Single-line Comment</h3><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre># \u0e19\u0e35\u0e48\u0e04\u0e37\u0e2d comment\nprint(\"Hello\")  # comment \u0e17\u0e49\u0e32\u0e22\u0e1a\u0e23\u0e23\u0e17\u0e31\u0e14</pre></div><h3>Multi-line Comment</h3><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>\"\"\"\nComment \u0e2b\u0e25\u0e32\u0e22\u0e1a\u0e23\u0e23\u0e17\u0e31\u0e14\nPython \u0e44\u0e21\u0e48\u0e1b\u0e23\u0e30\u0e21\u0e27\u0e25\u0e1c\u0e25\u0e2a\u0e48\u0e27\u0e19\u0e19\u0e35\u0e49\n\"\"\"\nprint(\"\u0e08\u0e1a\")</pre></div><div class=\"tip\"><span>\ud83d\udca1</span><span>\u0e40\u0e02\u0e35\u0e22\u0e19 comment \u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e2d\u0e18\u0e34\u0e1a\u0e32\u0e22\u0e27\u0e48\u0e32 '\u0e17\u0e33\u0e44\u0e21' \u0e44\u0e21\u0e48\u0e43\u0e0a\u0e48\u0e41\u0e04\u0e48 '\u0e17\u0e33\u0e2d\u0e30\u0e44\u0e23'</span></div>",

11:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd00</div><div><div class=\"ch-title\">\u0e04\u0e33\u0e2a\u0e31\u0e48\u0e07\u0e40\u0e07\u0e37\u0e48\u0e2d\u0e19\u0e44\u0e02</div><div class=\"ch-sub\">if / elif / else</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>score = 75\n\nif score &gt;= 80:\n    print(\"\u0e40\u0e01\u0e23\u0e14 A\")\nelif score &gt;= 70:\n    print(\"\u0e40\u0e01\u0e23\u0e14 B\")\nelif score &gt;= 60:\n    print(\"\u0e40\u0e01\u0e23\u0e14 C\")\nelse:\n    print(\"\u0e15\u0e49\u0e2d\u0e07\u0e1b\u0e23\u0e31\u0e1a\u0e1b\u0e23\u0e38\u0e07\")</pre></div><div class=\"out\"><div class=\"out-lbl\">\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</div>\u0e40\u0e01\u0e23\u0e14 B</div><div class=\"warn\"><span>\ud83d\udccc</span><span>Python \u0e43\u0e0a\u0e49 indentation (4 spaces) \u0e41\u0e17\u0e19\u0e27\u0e07\u0e40\u0e25\u0e47\u0e1a\u0e1b\u0e35\u0e01\u0e01\u0e32 { } \u2014 \u0e2a\u0e33\u0e04\u0e31\u0e0d\u0e21\u0e32\u0e01!</span></div>",
12:"<div class=\"ch-header\"><div class=\"ch-num\">\u26a1</div><div><div class=\"ch-title\">Ternary Operator</div><div class=\"ch-sub\">Conditional Expression</div></div></div><p>\u0e40\u0e02\u0e35\u0e22\u0e19\u0e40\u0e07\u0e37\u0e48\u0e2d\u0e19\u0e44\u0e02 if-else \u0e43\u0e19\u0e1a\u0e23\u0e23\u0e17\u0e31\u0e14\u0e40\u0e14\u0e35\u0e22\u0e27: <code>\u0e04\u0e48\u0e32_\u0e16\u0e49\u0e32\u0e08\u0e23\u0e34\u0e07 if \u0e40\u0e07\u0e37\u0e48\u0e2d\u0e19\u0e44\u0e02 else \u0e04\u0e48\u0e32_\u0e16\u0e49\u0e32\u0e40\u0e17\u0e47\u0e08</code></p><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>age = 20\nstatus = \"\u0e1c\u0e39\u0e49\u0e43\u0e2b\u0e0d\u0e48\" if age &gt;= 18 else \"\u0e40\u0e22\u0e32\u0e27\u0e0a\u0e19\"\nprint(status)  # \u0e1c\u0e39\u0e49\u0e43\u0e2b\u0e0d\u0e48\n\nscore = 55\nresult = \"\u0e1c\u0e48\u0e32\u0e19\" if score &gt;= 60 else \"\u0e44\u0e21\u0e48\u0e1c\u0e48\u0e32\u0e19\"\nprint(result)  # \u0e44\u0e21\u0e48\u0e1c\u0e48\u0e32\u0e19</pre></div>",
13:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd17</div><div><div class=\"ch-title\">\u0e15\u0e31\u0e27\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23\u0e15\u0e23\u0e23\u0e01\u0e30</div><div class=\"ch-sub\">and / or / not</div></div></div><div class=\"tbl\"><table><thead><tr><th>\u0e15\u0e31\u0e27\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23</th><th>\u0e04\u0e27\u0e32\u0e21\u0e2b\u0e21\u0e32\u0e22</th><th>\u0e15\u0e31\u0e27\u0e2d\u0e22\u0e48\u0e32\u0e07</th><th>\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</th></tr></thead><tbody><tr><td><code>and</code></td><td>\u0e17\u0e31\u0e49\u0e07\u0e2a\u0e2d\u0e07\u0e40\u0e1b\u0e47\u0e19\u0e08\u0e23\u0e34\u0e07</td><td><code>True and False</code></td><td>False</td></tr><tr><td><code>or</code></td><td>\u0e2d\u0e22\u0e48\u0e32\u0e07\u0e19\u0e49\u0e2d\u0e22\u0e2b\u0e19\u0e36\u0e48\u0e07\u0e08\u0e23\u0e34\u0e07</td><td><code>True or False</code></td><td>True</td></tr><tr><td><code>not</code></td><td>\u0e01\u0e25\u0e31\u0e1a\u0e04\u0e48\u0e32</td><td><code>not True</code></td><td>False</td></tr></tbody></table></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>age = 20\nhas_id = True\nif age &gt;= 18 and has_id:\n    print(\"\u0e40\u0e02\u0e49\u0e32\u0e44\u0e14\u0e49\")</pre></div>",
14:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83c\udf93</div><div><div class=\"ch-title\">\u0e42\u0e1b\u0e23\u0e41\u0e01\u0e23\u0e21\u0e15\u0e31\u0e14\u0e40\u0e01\u0e23\u0e14</div><div class=\"ch-sub\">Grade Program</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>score = float(input(\"\u0e43\u0e2a\u0e48\u0e04\u0e30\u0e41\u0e19\u0e19: \"))\nif score &gt;= 80:   print(\"\u0e40\u0e01\u0e23\u0e14 A\")\nelif score &gt;= 75: print(\"\u0e40\u0e01\u0e23\u0e14 B+\")\nelif score &gt;= 70: print(\"\u0e40\u0e01\u0e23\u0e14 B\")\nelif score &gt;= 65: print(\"\u0e40\u0e01\u0e23\u0e14 C+\")\nelif score &gt;= 60: print(\"\u0e40\u0e01\u0e23\u0e14 C\")\nelif score &gt;= 50: print(\"\u0e40\u0e01\u0e23\u0e14 D\")\nelse:             print(\"\u0e40\u0e01\u0e23\u0e14 F\")</pre></div>",
15:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83e\ude86</div><div><div class=\"ch-title\">Nested If</div><div class=\"ch-sub\">\u0e40\u0e07\u0e37\u0e48\u0e2d\u0e19\u0e44\u0e02\u0e0b\u0e49\u0e2d\u0e19\u0e01\u0e31\u0e19</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>age = 20\nincome = 25000\nif age &gt;= 18:\n    print(\"\u0e1c\u0e39\u0e49\u0e43\u0e2b\u0e0d\u0e48\")\n    if income &gt;= 15000:\n        print(\"\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e40\u0e1e\u0e35\u0e22\u0e07\u0e1e\u0e2d\")\n        if income &gt;= 30000:\n            print(\"\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e2a\u0e39\u0e07\")\n        else:\n            print(\"\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e1b\u0e32\u0e19\u0e01\u0e25\u0e32\u0e07\")\nelse:\n    print(\"\u0e40\u0e22\u0e32\u0e27\u0e0a\u0e19\")</pre></div><div class=\"out\"><div class=\"out-lbl\">\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</div>\u0e1c\u0e39\u0e49\u0e43\u0e2b\u0e0d\u0e48\n\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e40\u0e1e\u0e35\u0e22\u0e07\u0e1e\u0e2d\n\u0e23\u0e32\u0e22\u0e44\u0e14\u0e49\u0e1b\u0e32\u0e19\u0e01\u0e25\u0e32\u0e07</div><div class=\"warn\"><span>\u26a0\ufe0f</span><span>\u0e44\u0e21\u0e48\u0e04\u0e27\u0e23\u0e0b\u0e49\u0e2d\u0e19 if \u0e40\u0e01\u0e34\u0e19 3 \u0e0a\u0e31\u0e49\u0e19 \u2014 \u0e42\u0e04\u0e49\u0e14\u0e08\u0e30\u0e2d\u0e48\u0e32\u0e19\u0e22\u0e32\u0e01</span></div>",
16:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83c\udfaf</div><div><div class=\"ch-title\">Match Statement</div><div class=\"ch-sub\">Python 3.10+ \u2014 \u0e04\u0e25\u0e49\u0e32\u0e22 Switch-Case</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>day = \"Monday\"\nmatch day:\n    case \"Monday\":\n        print(\"\u0e40\u0e23\u0e34\u0e48\u0e21\u0e2a\u0e31\u0e1b\u0e14\u0e32\u0e2b\u0e4c\")\n    case \"Friday\":\n        print(\"\u0e43\u0e01\u0e25\u0e49\u0e2b\u0e22\u0e38\u0e14\u0e41\u0e25\u0e49\u0e27!\")\n    case \"Saturday\" | \"Sunday\":\n        print(\"\u0e27\u0e31\u0e19\u0e2b\u0e22\u0e38\u0e14!\")\n    case _:\n        print(\"\u0e27\u0e31\u0e19\u0e17\u0e33\u0e07\u0e32\u0e19\")</pre></div><div class=\"note\"><span>\ud83d\udcd8</span><span>match-case \u0e43\u0e0a\u0e49\u0e44\u0e14\u0e49\u0e43\u0e19 Python 3.10 \u0e02\u0e36\u0e49\u0e19\u0e44\u0e1b\u0e40\u0e17\u0e48\u0e32\u0e19\u0e31\u0e49\u0e19</span></div>",
17:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd01</div><div><div class=\"ch-title\">While Loop</div><div class=\"ch-sub\">\u0e27\u0e19\u0e0b\u0e49\u0e33\u0e15\u0e32\u0e21\u0e40\u0e07\u0e37\u0e48\u0e2d\u0e19\u0e44\u0e02</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>i = 1\nwhile i &lt;= 5:\n    print(f\"\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 {i}\")\n    i += 1\nprint(\"\u0e08\u0e1a\u0e25\u0e39\u0e1b\")</pre></div><div class=\"out\"><div class=\"out-lbl\">\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</div>\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 1\n\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 2\n\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 3\n\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 4\n\u0e23\u0e2d\u0e1a\u0e17\u0e35\u0e48 5\n\u0e08\u0e1a\u0e25\u0e39\u0e1b</div><div class=\"warn\"><span>\u26a0\ufe0f</span><span>\u0e2d\u0e22\u0e48\u0e32\u0e25\u0e37\u0e21\u0e40\u0e1e\u0e34\u0e48\u0e21\u0e04\u0e48\u0e32 i \u0e43\u0e19\u0e25\u0e39\u0e1b \u0e44\u0e21\u0e48\u0e07\u0e31\u0e49\u0e19\u0e08\u0e30\u0e40\u0e01\u0e34\u0e14 infinite loop!</span></div>",
18:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd02</div><div><div class=\"ch-title\">For Loop</div><div class=\"ch-sub\">\u0e27\u0e19\u0e0b\u0e49\u0e33\u0e15\u0e32\u0e21\u0e25\u0e33\u0e14\u0e31\u0e1a</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>for i in range(5):        # 0,1,2,3,4\n    print(i, end=\" \")\n\nfor i in range(1, 6):     # 1,2,3,4,5\n    print(i, end=\" \")\n\nfor i in range(0, 10, 2): # 0,2,4,6,8\n    print(i, end=\" \")\n\nfruits = [\"\u0e41\u0e2d\u0e1b\u0e40\u0e1b\u0e34\u0e49\u0e25\", \"\u0e01\u0e25\u0e49\u0e27\u0e22\", \"\u0e2a\u0e49\u0e21\"]\nfor f in fruits:\n    print(f)</pre></div>",
19:"<div class=\"ch-header\"><div class=\"ch-num\">\u23f9\ufe0f</div><div><div class=\"ch-title\">\u0e04\u0e33\u0e2a\u0e31\u0e48\u0e07\u0e40\u0e01\u0e35\u0e48\u0e22\u0e27\u0e01\u0e31\u0e1a Loop</div><div class=\"ch-sub\">break / continue / pass</div></div></div><div class=\"tbl\"><table><thead><tr><th>\u0e04\u0e33\u0e2a\u0e31\u0e48\u0e07</th><th>\u0e2b\u0e19\u0e49\u0e32\u0e17\u0e35\u0e48</th></tr></thead><tbody><tr><td><code>break</code></td><td>\u0e2b\u0e22\u0e38\u0e14\u0e25\u0e39\u0e1b\u0e17\u0e31\u0e19\u0e17\u0e35 \u0e2d\u0e2d\u0e01\u0e08\u0e32\u0e01\u0e25\u0e39\u0e1b</td></tr><tr><td><code>continue</code></td><td>\u0e02\u0e49\u0e32\u0e21\u0e23\u0e2d\u0e1a\u0e19\u0e35\u0e49 \u0e44\u0e1b\u0e23\u0e2d\u0e1a\u0e16\u0e31\u0e14\u0e44\u0e1b</td></tr><tr><td><code>pass</code></td><td>\u0e44\u0e21\u0e48\u0e17\u0e33\u0e2d\u0e30\u0e44\u0e23 (placeholder)</td></tr></tbody></table></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre># break\nfor i in range(10):\n    if i == 5: break\n    print(i, end=\" \")  # 0 1 2 3 4\n\n# continue\nfor i in range(1, 11):\n    if i % 2 == 0: continue\n    print(i, end=\" \")  # 1 3 5 7 9</pre></div>",
20:"<div class=\"ch-header\"><div class=\"ch-num\">\u2716\ufe0f</div><div><div class=\"ch-title\">\u0e41\u0e2a\u0e14\u0e07\u0e2a\u0e39\u0e15\u0e23\u0e04\u0e39\u0e13</div><div class=\"ch-sub\">\u0e15\u0e32\u0e23\u0e32\u0e07\u0e2a\u0e39\u0e15\u0e23\u0e04\u0e39\u0e13</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>n = int(input(\"\u0e2a\u0e39\u0e15\u0e23\u0e04\u0e39\u0e13\u0e41\u0e21\u0e48\u0e44\u0e2b\u0e19? \"))\nprint(f\"--- \u0e41\u0e21\u0e48 {n} ---\")\nfor i in range(1, 13):\n    print(f\"{n} x {i:2d} = {n*i:3d}\")</pre></div>",
21:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83e\uddee</div><div><div class=\"ch-title\">\u0e2b\u0e32\u0e1c\u0e25\u0e23\u0e27\u0e21 5 \u0e08\u0e33\u0e19\u0e27\u0e19</div><div class=\"ch-sub\">Fixed Sum</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>total = 0\nfor i in range(1, 6):\n    num = float(input(f\"\u0e15\u0e31\u0e27\u0e40\u0e25\u0e02\u0e17\u0e35\u0e48 {i}: \"))\n    total += num\nprint(f\"\u0e1c\u0e25\u0e23\u0e27\u0e21 = {total}\")\nprint(f\"\u0e40\u0e09\u0e25\u0e35\u0e48\u0e22 = {total/5:.2f}\")</pre></div>",
22:"<div class=\"ch-header\"><div class=\"ch-num\">\u2211</div><div><div class=\"ch-title\">\u0e2b\u0e32\u0e1c\u0e25\u0e23\u0e27\u0e21 (\u0e44\u0e21\u0e48\u0e08\u0e33\u0e01\u0e31\u0e14\u0e08\u0e33\u0e19\u0e27\u0e19)</div><div class=\"ch-sub\">Dynamic Sum with Sentinel</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>total = 0\ncount = 0\nwhile True:\n    val = input(\"\u0e43\u0e2a\u0e48\u0e15\u0e31\u0e27\u0e40\u0e25\u0e02 (\u0e1e\u0e34\u0e21\u0e1e\u0e4c \u0e08\u0e1a \u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e2b\u0e22\u0e38\u0e14): \")\n    if val == \"\u0e08\u0e1a\":\n        break\n    total += float(val)\n    count += 1\nif count &gt; 0:\n    print(f\"\u0e1c\u0e25\u0e23\u0e27\u0e21 = {total}, \u0e40\u0e09\u0e25\u0e35\u0e48\u0e22 = {total/count:.2f}\")\nelse:\n    print(\"\u0e44\u0e21\u0e48\u0e21\u0e35\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\")</pre></div>",
23:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83c\udf00</div><div><div class=\"ch-title\">Nested Loop</div><div class=\"ch-sub\">\u0e25\u0e39\u0e1b\u0e0b\u0e49\u0e2d\u0e19\u0e25\u0e39\u0e1b</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre># \u0e2a\u0e35\u0e48\u0e40\u0e2b\u0e25\u0e35\u0e48\u0e22\u0e21\u0e14\u0e32\u0e27\nfor r in range(4):\n    for c in range(6):\n        print(\"\u2605\", end=\" \")\n    print()\n\n# \u0e2a\u0e32\u0e21\u0e40\u0e2b\u0e25\u0e35\u0e48\u0e22\u0e21\nfor i in range(1, 6):\n    print(\"\u2605\" * i)</pre></div><div class=\"out\"><div class=\"out-lbl\">\u0e1c\u0e25\u0e25\u0e31\u0e1e\u0e18\u0e4c</div>\u2605 \u2605 \u2605 \u2605 \u2605 \u2605\n\u2605 \u2605 \u2605 \u2605 \u2605 \u2605\n...\n\u2605\n\u2605\u2605\n\u2605\u2605\u2605\n\u2605\u2605\u2605\u2605\n\u2605\u2605\u2605\u2605\u2605</div>",
24:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udcd0</div><div><div class=\"ch-title\">\u0e2a\u0e39\u0e15\u0e23\u0e04\u0e39\u0e13\u0e41\u0e1a\u0e1a\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e0a\u0e48\u0e27\u0e07</div><div class=\"ch-sub\">Range Loop</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>start = 2\nend = 4\nfor n in range(start, end + 1):\n    print(f\"\\n--- \u0e41\u0e21\u0e48 {n} ---\")\n    for i in range(1, 13):\n        print(f\"  {n} x {i:2d} = {n*i:3d}\")</pre></div>",
25:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udcdd</div><div><div class=\"ch-title\">\u0e40\u0e08\u0e32\u0e30\u0e25\u0e36\u0e01 String</div><div class=\"ch-sub\">String in-depth</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>s = \"Hello, Python!\"\nprint(len(s))         # 14\nprint(s[0])           # H\nprint(s[-1])          # !\nprint(s[0:5])         # Hello\nprint(s[::-1])        # !nohtyP ,olleH\nprint(\"Hello\" * 3)    # HelloHelloHello\nprint(\"Python\" in s)  # True</pre></div>",
26:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd27</div><div><div class=\"ch-title\">\u0e1f\u0e31\u0e07\u0e01\u0e4c\u0e0a\u0e31\u0e19 String</div><div class=\"ch-sub\">String Methods</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>s = \"  Hello, Python World!  \"\nprint(s.upper())\nprint(s.lower())\nprint(s.strip())\nprint(s.replace(\"Python\", \"\u0e2a\u0e27\u0e31\u0e2a\u0e14\u0e35\"))\nprint(s.split(\",\"))\nprint(\"-\".join([\"a\",\"b\",\"c\"]))\nprint(s.find(\"Python\"))\nprint(\"42\".isdigit())</pre></div>",
27:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udccb</div><div><div class=\"ch-title\">List (\u0e25\u0e34\u0e2a\u0e15\u0e4c)</div><div class=\"ch-sub\">\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e2b\u0e25\u0e32\u0e22\u0e04\u0e48\u0e32\u0e40\u0e23\u0e35\u0e22\u0e07\u0e25\u0e33\u0e14\u0e31\u0e1a</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>nums = [1, 2, 3, 4, 5]\nprint(nums[0])      # 1\nprint(nums[-1])     # 5\nprint(nums[1:4])    # [2, 3, 4]\nprint(len(nums))    # 5\n\nfruits = [\"\u0e41\u0e2d\u0e1b\u0e40\u0e1b\u0e34\u0e49\u0e25\", \"\u0e01\u0e25\u0e49\u0e27\u0e22\", \"\u0e2a\u0e49\u0e21\"]\nfor i, f in enumerate(fruits):\n    print(f\"{i}: {f}\")</pre></div>",
28:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd27</div><div><div class=\"ch-title\">\u0e1f\u0e31\u0e07\u0e01\u0e4c\u0e0a\u0e31\u0e19 List</div><div class=\"ch-sub\">List Methods</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>lst = [3, 1, 4, 1, 5, 9]\nlst.append(2)         # \u0e40\u0e1e\u0e34\u0e48\u0e21\u0e17\u0e49\u0e32\u0e22\nlst.insert(0, 0)      # \u0e40\u0e1e\u0e34\u0e48\u0e21\u0e17\u0e35\u0e48\u0e15\u0e33\u0e41\u0e2b\u0e19\u0e48\u0e07 0\nlst.remove(1)         # \u0e25\u0e1a\u0e04\u0e48\u0e32\u0e41\u0e23\u0e01\u0e17\u0e35\u0e48\u0e40\u0e08\u0e2d\nlst.pop()             # \u0e25\u0e1a\u0e15\u0e31\u0e27\u0e2a\u0e38\u0e14\u0e17\u0e49\u0e32\u0e22\nlst.sort()            # \u0e40\u0e23\u0e35\u0e22\u0e07\u0e19\u0e49\u0e2d\u0e22\u2192\u0e21\u0e32\u0e01\nlst.sort(reverse=True)# \u0e21\u0e32\u0e01\u2192\u0e19\u0e49\u0e2d\u0e22\nprint(sum(lst))\nprint(max(lst))\nprint(min(lst))</pre></div>",
29:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd12</div><div><div class=\"ch-title\">Tuple (\u0e17\u0e39\u0e40\u0e1e\u0e34\u0e25)</div><div class=\"ch-sub\">\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e17\u0e35\u0e48\u0e41\u0e01\u0e49\u0e44\u0e02\u0e44\u0e21\u0e48\u0e44\u0e14\u0e49 (Immutable)</div></div></div><p>Tuple \u0e04\u0e25\u0e49\u0e32\u0e22 List \u0e41\u0e15\u0e48 <strong>\u0e41\u0e01\u0e49\u0e44\u0e02\u0e44\u0e21\u0e48\u0e44\u0e14\u0e49</strong> \u0e2b\u0e25\u0e31\u0e07\u0e08\u0e32\u0e01\u0e2a\u0e23\u0e49\u0e32\u0e07 \u0e43\u0e0a\u0e49\u0e27\u0e07\u0e40\u0e25\u0e47\u0e1a <code>()</code></p><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>t = (1, 2, 3, 4, 5)\nprint(t[0])      # 1\nprint(t[-1])     # 5\n\n# Unpacking\nx, y, z = (10, 20, 30)\nprint(f\"x={x}, y={y}, z={z}\")\n\nlst = list(t)    # tuple \u2192 list\nprint(type(lst))</pre></div><div class=\"tip\"><span>\ud83d\udca1</span><span>\u0e43\u0e0a\u0e49 Tuple \u0e2a\u0e33\u0e2b\u0e23\u0e31\u0e1a\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e17\u0e35\u0e48\u0e44\u0e21\u0e48\u0e04\u0e27\u0e23\u0e40\u0e1b\u0e25\u0e35\u0e48\u0e22\u0e19 \u0e40\u0e0a\u0e48\u0e19 \u0e1e\u0e34\u0e01\u0e31\u0e14, \u0e2a\u0e35 RGB, \u0e04\u0e48\u0e32 config</span></div>",
30:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83c\udfb1</div><div><div class=\"ch-title\">Set (\u0e40\u0e0b\u0e15)</div><div class=\"ch-sub\">\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e44\u0e21\u0e48\u0e0b\u0e49\u0e33 \u0e44\u0e21\u0e48\u0e21\u0e35\u0e25\u0e33\u0e14\u0e31\u0e1a</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>s = {1, 2, 3, 2, 1}\nprint(s)          # {1, 2, 3}\n\na = {1, 2, 3, 4}\nb = {3, 4, 5, 6}\nprint(a | b)  # Union: {1,2,3,4,5,6}\nprint(a &amp; b)  # Intersection: {3,4}\nprint(a - b)  # Difference: {1,2}\nprint(a ^ b)  # Symmetric: {1,2,5,6}</pre></div>",
31:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udcd6</div><div><div class=\"ch-title\">Dictionary</div><div class=\"ch-sub\">key: value</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>student = {\n    \"name\":  \"\u0e2a\u0e21\u0e0a\u0e32\u0e22\",\n    \"age\":   18,\n    \"score\": 92.5\n}\nprint(student[\"name\"])          # \u0e2a\u0e21\u0e0a\u0e32\u0e22\nprint(student.get(\"grade\",\"N/A\")) # N/A\nstudent[\"grade\"] = \"A\"\nfor k, v in student.items():\n    print(f\"{k}: {v}\")</pre></div>",
32:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83d\udd27</div><div><div class=\"ch-title\">\u0e1f\u0e31\u0e07\u0e01\u0e4c\u0e0a\u0e31\u0e19 Dictionary</div><div class=\"ch-sub\">Dict Methods</div></div></div><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>d = {\"a\":1, \"b\":2, \"c\":3}\nprint(list(d.keys()))\nprint(list(d.values()))\nd.update({\"d\":4})\nx = d.pop(\"a\")\nprint(d)\n\n# Dict Comprehension\nsq = {i: i**2 for i in range(1,6)}\nprint(sq)</pre></div>",
33:"<div class=\"ch-header\"><div class=\"ch-num\">\ud83e\udeaa</div><div><div class=\"ch-title\">\u0e15\u0e31\u0e27\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23\u0e40\u0e2d\u0e01\u0e25\u0e31\u0e01\u0e29\u0e13\u0e4c</div><div class=\"ch-sub\">is / is not</div></div></div><p>\u0e15\u0e23\u0e27\u0e08\u0e2a\u0e2d\u0e1a\u0e27\u0e48\u0e32\u0e15\u0e31\u0e27\u0e41\u0e1b\u0e23\u0e2a\u0e2d\u0e07\u0e15\u0e31\u0e27 <strong>\u0e0a\u0e35\u0e49\u0e44\u0e1b\u0e17\u0e35\u0e48 object \u0e40\u0e14\u0e35\u0e22\u0e27\u0e01\u0e31\u0e19</strong> \u0e43\u0e19\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e04\u0e27\u0e32\u0e21\u0e08\u0e33</p><div class=\"cb\"><div class=\"cb-hdr\"><span class=\"cb-lang\">Python</span><button class=\"cb-copy\" onclick=\"cpBlock(this)\">\u0e04\u0e31\u0e14\u0e25\u0e2d\u0e01</button></div><pre>a = [1, 2, 3]\nb = a           # b \u0e0a\u0e35\u0e49 object \u0e40\u0e14\u0e35\u0e22\u0e27\u0e01\u0e31\u0e1a a\nc = [1, 2, 3]   # c \u0e04\u0e37\u0e2d object \u0e43\u0e2b\u0e21\u0e48\nprint(a is b)   # True\nprint(a is c)   # False\nprint(a == c)   # True (\u0e04\u0e48\u0e32\u0e40\u0e17\u0e48\u0e32\u0e01\u0e31\u0e19)\n\nx = None\nprint(x is None)  # True \u2713</pre></div><div class=\"warn\"><span>\u26a0\ufe0f</span><span>\u0e43\u0e0a\u0e49 <code>==</code> \u0e40\u0e1b\u0e23\u0e35\u0e22\u0e1a\u0e40\u0e17\u0e35\u0e22\u0e1a '\u0e04\u0e48\u0e32' \u0e41\u0e25\u0e30 <code>is</code> \u0e40\u0e1b\u0e23\u0e35\u0e22\u0e1a\u0e40\u0e17\u0e35\u0e22\u0e1a 'object' \u0e2d\u0e22\u0e48\u0e32\u0e2a\u0e31\u0e1a\u0e2a\u0e19!</span></div>",

    return false;
  };

  StmtParser.prototype.parseBlock = function(minIndent) {
    var stmts = [];
    while (true) {
      this.skipNewlines();
      var t = this.tokens[this.pos];
      if (!t || t.type==='EOF') break;
      if (t.type==='DEDENT') { this.pos++; break; }
      if (t.type==='INDENT') { this.pos++; continue; }
      var stmt = this.parseStmt();
      if (stmt) stmts.push(stmt);
    }
    return stmts;
  };

  StmtParser.prototype.parseStmt = function() {
    this.skipNewlines();
    var t = this.peek();
    if (!t || t.type==='EOF' || t.type==='DEDENT') return null;

    if (t.type==='KW') {
      switch(t.value) {
        case 'if':     return this.parseIf();
        case 'for':    return this.parseFor();
        case 'while':  return this.parseWhile();
        case 'def':    return this.parseDef();
        case 'return': return this.parseReturn();
        case 'break':  this.consume(); return {type:'break'};
        case 'continue':this.consume();return {type:'continue'};
        case 'pass':   this.consume(); return {type:'pass'};
        case 'import': return this.parseImport();
        case 'from':   return this.parseFrom();
        case 'match':  return this.parseMatch();
        case 'global': return this.parseGlobal();
        case 'del':    return this.parseDel();
        case 'elif':   return null;
        case 'else':   return null;
        case 'class':  return this.parseClass();
        case 'try':    return this.parseTry();
        case 'raise':  this.consume(); this.parseExprLine(); return {type:'pass'};
        case 'assert': this.consume(); this.parseExprLine(); return {type:'pass'};
        case 'with':   this.consume(); this.parseExprLine(); if(this.match('KW','as')) this.parseExprLine(); return this.parseColon();
        default: this.consume(); return {type:'pass'};
      }
    }

    // Expression statement or assignment
    return this.parseExprStmt();
  };

  StmtParser.prototype.parseColon = function() {
    if (this.match('OP',':')) {
      if (this.match('INDENT')) {
        return {type:'pass', body: this.parseBlock()};
      }
    }
    return {type:'pass'};
  };

  StmtParser.prototype.parseIf = function() {
    this.consume(); // 'if'
    var cond = this.parseExprLine();
    this.match('OP',':');
    this.match('INDENT');
    var body = this.parseBlock();
    var clauses = [{cond:cond, body:body}];
    while (true) {
      this.skipNewlines();
      var t = this.peek();
      if (!t) break;
      if (t.type==='KW' && t.value==='elif') {
        this.consume();
        var ec = this.parseExprLine();
        this.match('OP',':');
        this.match('INDENT');
        clauses.push({cond:ec, body:this.parseBlock()});
      } else if (t.type==='KW' && t.value==='else') {
        this.consume();
        this.match('OP',':');
        this.match('INDENT');
        clauses.push({cond:null, body:this.parseBlock()});
        break;
      } else break;
    }
    return {type:'if', clauses:clauses};
  };

  StmtParser.prototype.parseFor = function() {
    this.consume(); // 'for'
    var target = this.parseExprLine(true, true); // stop at 'in' and comma
    // Handle multiple targets: for i, v in ...
    this.skipNewlines();
    if (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value===',') {
      var targets = [target];
      while (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value===',') {
        this.pos++;
        this.skipNewlines();
        var nt = this.tokens[this.pos];
        if (nt && nt.type==='KW' && nt.value==='in') break;
        targets.push(this.parseExprLine(true, true));
        this.skipNewlines();
      }
      target = {type:'tuple', elements:targets};
    }
    this.match('KW','in');
    var iter = this.parseExprLine();
    this.match('OP',':');
    this.match('INDENT');
    var body = this.parseBlock();
    return {type:'for', target:target, iter:iter, body:body};
  };

  StmtParser.prototype.parseWhile = function() {
    this.consume(); // 'while'
    var cond = this.parseExprLine();
    this.match('OP',':');
    this.match('INDENT');
    var body = this.parseBlock();
    var elsebody = null;
    this.skipNewlines();
    var t = this.peek();
    if (t && t.type==='KW' && t.value==='else') {
      this.consume();
      this.match('OP',':');
      this.match('INDENT');
      elsebody = this.parseBlock();
    }
    return {type:'while', cond:cond, body:body, elsebody:elsebody};
  };

  StmtParser.prototype.parseDef = function() {
    this.consume(); // 'def'
    var name = this.consume().value;
    this.match('OP','(');
    var params = [];
    while (!this.peekAfterNewline_is('OP',')')) {
      this.skipNewlines();
      var t = this.tokens[this.pos];
      if (!t||t.type==='EOF'||(t.type==='OP'&&t.value===')')) break;
      if (t.type==='OP'&&t.value==='*') { this.pos++; this.pos++; continue; } // *args
      if (t.type==='OP'&&t.value==='**') { this.pos+=2; continue; } // **kwargs
      var pname = this.consume().value;
      var pdefault = undefined;
      this.skipNewlines();
      if (this.tokens[this.pos]&&this.tokens[this.pos].type==='OP'&&this.tokens[this.pos].value===':') {
        // type annotation — skip
        this.pos++;
        this.parseExprLine(false, true);
      }
      if (this.tokens[this.pos]&&this.tokens[this.pos].type==='OP'&&this.tokens[this.pos].value==='=') {
        this.pos++;
        pdefault = this.parseExprLine(false, true);
      }
      params.push({name:pname, default:pdefault});
      this.skipNewlines();
      if (this.tokens[this.pos]&&this.tokens[this.pos].type==='OP'&&this.tokens[this.pos].value===',') this.pos++;
    }
    this.match('OP',')');
    // return type annotation
    if (this.tokens[this.pos]&&this.tokens[this.pos].type==='OP'&&this.tokens[this.pos].value==='->') {
      this.pos++;
      this.parseExprLine();
    }
    this.match('OP',':');
    // Docstring check
    this.skipNewlines();
    this.match('INDENT');
    var body = this.parseBlock();
    return {type:'def', name:name, params:params, body:body};
  };

  StmtParser.prototype.peekAfterNewline_is = function(type, value) {
    var p = this.pos;
    while (p<this.tokens.length && this.tokens[p].type==='NEWLINE') p++;
    var t = this.tokens[p];
    return t && t.type===type && t.value===value;
  };

  StmtParser.prototype.parseReturn = function() {
    this.consume(); // 'return'
    this.skipNewlines();
    var t = this.tokens[this.pos];
    if (!t || t.type==='NEWLINE' || t.type==='EOF' || t.type==='DEDENT') return {type:'return', value:null};
    return {type:'return', value:this.parseExprLine()};
  };

  StmtParser.prototype.parseImport = function() {
    this.consume();
    while (this.pos<this.tokens.length && this.tokens[this.pos].type!=='NEWLINE' && this.tokens[this.pos].type!=='EOF') this.pos++;
    return {type:'import'};
  };

  StmtParser.prototype.parseFrom = function() {
    this.consume();
    while (this.pos<this.tokens.length && this.tokens[this.pos].type!=='NEWLINE' && this.tokens[this.pos].type!=='EOF') this.pos++;
    return {type:'import'};
  };

  StmtParser.prototype.parseGlobal = function() {
    this.consume();
    while (this.pos<this.tokens.length && this.tokens[this.pos].type!=='NEWLINE') this.pos++;
    return {type:'global'};
  };

  StmtParser.prototype.parseDel = function() {
    this.consume();
    var target = this.parseExprLine();
    return {type:'delete', target:target};
  };

  StmtParser.prototype.parseClass = function() {
    this.consume();
    while (this.pos<this.tokens.length && this.tokens[this.pos].type!=='OP'||this.tokens[this.pos].value!==':') {
      if(this.tokens[this.pos].type==='NEWLINE'||this.tokens[this.pos].type==='EOF') break;
      this.pos++;
    }
    this.match('OP',':');
    this.match('INDENT');
    this.parseBlock();
    return {type:'pass'};
  };

  StmtParser.prototype.parseTry = function() {
    this.consume();
    this.match('OP',':');
    this.match('INDENT');
    var body = this.parseBlock();
    var result = {type:'if', clauses:[{cond:{type:'bool',value:true}, body:body}]};
    // skip except/finally
    while (true) {
      this.skipNewlines();
      var t = this.peek();
      if (!t) break;
      if (t.type==='KW' && (t.value==='except'||t.value==='finally'||t.value==='else')) {
        this.consume();
        while (this.pos<this.tokens.length && this.tokens[this.pos].type!=='OP' && this.tokens[this.pos].value!==':' && this.tokens[this.pos].type!=='NEWLINE') this.pos++;
        this.match('OP',':');
        this.match('INDENT');
        this.parseBlock();
      } else break;
    }
    return result;
  };

  StmtParser.prototype.parseMatch = function() {
    this.consume(); // 'match'
    var subject = this.parseExprLine();
    this.match('OP',':');
    this.match('INDENT');
    var cases = [];
    while (true) {
      this.skipNewlines();
      var t = this.peek();
      if (!t || t.type==='DEDENT' || t.type==='EOF') break;
      if (t.type==='KW' && t.value==='case') {
        this.consume();
        var pattern = '_';
        var patterns = null;
        this.skipNewlines();
        var pt = this.tokens[this.pos];
        if (pt && pt.type==='NAME' && pt.value==='_') {
          this.pos++;
          pattern = '_';
        } else {
          var patExpr = this.parseExprLine(false, false, true); // stop at | and :
          pattern = patExpr;
          // Check for | patterns
          this.skipNewlines();
          if (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value==='|') {
            patterns = [patExpr];
            while (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value==='|') {
              this.pos++;
              patterns.push(this.parseExprLine(false, false, true));
            }
          }
        }
        this.match('OP',':');
        this.match('INDENT');
        var cbody = this.parseBlock();
        cases.push({pattern: pattern, patterns: patterns, body: cbody});
      } else {
        this.pos++;
      }
    }
    this.match('DEDENT');
    return {type:'match', subject:subject, cases:cases};
  };

  StmtParser.prototype.parseExprStmt = function() {
    var expr = this.parseExprLine();
    if (!expr) return null;
    this.skipNewlines();
    var t = this.tokens[this.pos];

    // Check for comma → tuple unpacking target: a, b = ...
    if (t && t.type==='OP' && t.value===',') {
      var targets = [expr];
      while (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value===',') {
        this.pos++;
        this.skipNewlines();
        var nt = this.tokens[this.pos];
        if (nt && nt.type==='OP' && nt.value==='=') break;
        targets.push(this.parseExprLine(false, true)); // stop at comma
      }
      expr = {type:'tuple', elements:targets};
      this.skipNewlines();
      t = this.tokens[this.pos];
    }

    if (!t) return {type:'expr',expr:expr};

    var augOps = ['+=','-=','*=','/=','//=','%=','**=','&=','|=','^='];
    if (t.type==='OP' && augOps.includes(t.value)) {
      var op = t.value; this.pos++;
      var rhs = this.parseRHS();
      return {type:'augassign', target:expr, op:op, value:rhs};
    }

    if (t.type==='OP' && t.value==='=') {
      this.pos++;
      // Chained assignment: a = b = c = value
      var targets = [expr];
      var rhs = this.parseRHS();
      this.skipNewlines();
      while (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value==='=') {
        this.pos++;
        targets.push(rhs);
        rhs = this.parseRHS();
        this.skipNewlines();
      }
      if (targets.length > 1) {
        return {type:'multiassign', targets:targets, value:rhs};
      }
      return {type:'assign', target:expr, value:rhs};
    }

    return {type:'expr', expr:expr};
  };

  // Parse right-hand side — handles comma-separated values as tuple: = 17, 5
  StmtParser.prototype.parseRHS = function() {
    var first = this.parseExprLine(false, true); // stop at comma
    this.skipNewlines();
    var t = this.tokens[this.pos];
    if (t && t.type==='OP' && t.value===',') {
      var elements = [first];
      while (this.tokens[this.pos] && this.tokens[this.pos].type==='OP' && this.tokens[this.pos].value===',') {
        this.pos++;
        this.skipNewlines();
        var nt = this.tokens[this.pos];
        if (!nt || nt.type==='NEWLINE' || nt.type==='EOF' || nt.type==='DEDENT') break;
        elements.push(this.parseExprLine(false, true));
      }
      return {type:'tuple', elements:elements};
    }
    return first;
  };

  // parseExprLine: parse a full expression, stopping at newline/colon(for for-in)/etc.
  StmtParser.prototype.parseExprLine = function(stopAtIn, stopAtComma, stopAtPipe) {
    var ep = new ExprParser(this.tokens, this.pos, stopAtIn, stopAtComma, stopAtPipe);
    var expr = ep.parse();
    this.pos = ep.pos;
    return expr;
  };

  /* ── EXPRESSION PARSER ── */
  function ExprParser(tokens, pos, stopAtIn, stopAtComma, stopAtPipe) {
    this.tokens = tokens;
    this.pos = pos || 0;
    this.stopAtIn = stopAtIn;
    this.stopAtComma = stopAtComma;
    this.stopAtPipe = stopAtPipe;
  }

  ExprParser.prototype.peek = function() {
    var p = this.pos;
    while (p<this.tokens.length && this.tokens[p].type==='NEWLINE') p++;
    return this.tokens[p] || {type:'EOF'};
  };

  ExprParser.prototype.consume = function() {
    while (this.pos<this.tokens.length && this.tokens[this.pos].type==='NEWLINE') this.pos++;
    return this.tokens[this.pos++] || {type:'EOF'};
  };

  ExprParser.prototype.match = function(type, value) {
    var t = this.peek();
    if (t.type===type && (value===undefined||t.value===value)) { this.consume(); return true; }
    return false;
  };

  ExprParser.prototype.parse = function() { return this.parseTernary(); };

  ExprParser.prototype.parseTernary = function() {
    var expr = this.parseOr();
    var t = this.peek();
    if (t.type==='KW' && t.value==='if') {
      this.consume();
      var cond = this.parseOr();
      var t2 = this.peek();
      if (t2.type==='KW' && t2.value==='else') {
        this.consume();
        var ifFalse = this.parseTernary();
        return {type:'ternary', cond:cond, ifTrue:expr, ifFalse:ifFalse};
      }
    }
    return expr;
  };

  ExprParser.prototype.parseOr = function() {
    var left = this.parseAnd();
    while (this.peek().type==='KW' && this.peek().value==='or') {
      this.consume();
      var right = this.parseAnd();
      left = {type:'binop', op:'or', left:left, right:right};
    }
    return left;
  };

  ExprParser.prototype.parseAnd = function() {
    var left = this.parseNot();
    while (this.peek().type==='KW' && this.peek().value==='and') {
      this.consume();
      var right = this.parseNot();
      left = {type:'binop', op:'and', left:left, right:right};
    }
    return left;
  };

  ExprParser.prototype.parseNot = function() {
    if (this.peek().type==='KW' && this.peek().value==='not') {
      this.consume();
      // check for "not in"
      if (this.peek().type==='KW' && this.peek().value==='in') {
        // This is handled at compare level — back up
        this.pos--;
        return this.parseCompare();
      }
      return {type:'unop', op:'not', operand:this.parseNot()};
    }
    return this.parseCompare();
  };

  ExprParser.prototype.parseCompare = function() {
    var left = this.parseBitor();
    var ops = [], comparators = [];
    var CMP_OPS = ['==','!=','<','>','<=','>='];
    var CMP_KW  = ['in','is'];
    while (true) {
      var t = this.peek();
      var op = null;
      if (t.type==='OP' && CMP_OPS.includes(t.value)) { op=t.value; this.consume(); }
      else if (t.type==='KW' && t.value==='not') {
        // 'not in'
        var saved = this.pos;
        this.consume();
        if (this.peek().type==='KW' && this.peek().value==='in') { this.consume(); op='not in'; }
        else { this.pos=saved; break; }
      }
      else if (t.type==='KW' && t.value==='in' && !this.stopAtIn) { op='in'; this.consume(); }
      else if (t.type==='KW' && t.value==='is') {
        this.consume();
        if (this.peek().type==='KW' && this.peek().value==='not') { this.consume(); op='is not'; }
        else op='is';
      }
      else break;
      if (!op) break;
      ops.push(op);
      comparators.push(this.parseBitor());
    }
    if (ops.length===0) return left;
    return {type:'compare', left:left, ops:ops, comparators:comparators};
  };

  ExprParser.prototype.parseBitor = function() {
    var left = this.parseBitxor();
    while (!this.stopAtPipe && this.peek().type==='OP' && this.peek().value==='|') {
      this.consume();
      left = {type:'binop', op:'|', left:left, right:this.parseBitxor()};
    }
    return left;
  };

  ExprParser.prototype.parseBitxor = function() {
    var left = this.parseBitand();
    while (this.peek().type==='OP' && this.peek().value==='^') {
      this.consume(); left = {type:'binop', op:'^', left:left, right:this.parseBitand()};
    }
    return left;
  };

  ExprParser.prototype.parseBitand = function() {
    var left = this.parseShift();
    while (this.peek().type==='OP' && this.peek().value==='&') {
      this.consume(); left = {type:'binop', op:'&', left:left, right:this.parseShift()};
    }
    return left;
  };

  ExprParser.prototype.parseShift = function() {
    var left = this.parseAdd();
    while (this.peek().type==='OP' && (this.peek().value==='<<'||this.peek().value==='>>')) {
      var op=this.consume().value; left={type:'binop',op:op,left:left,right:this.parseAdd()};
    }
    return left;
  };

  ExprParser.prototype.parseAdd = function() {
    var left = this.parseMul();
    while (this.peek().type==='OP' && (this.peek().value==='+'||this.peek().value==='-')) {
      var op=this.consume().value; left={type:'binop',op:op,left:left,right:this.parseMul()};
    }
    return left;
  };

  ExprParser.prototype.parseMul = function() {
    var left = this.parseUnary();
    while (this.peek().type==='OP' && ['*','/','//','%'].includes(this.peek().value)) {
      var op=this.consume().value; left={type:'binop',op:op,left:left,right:this.parseUnary()};
    }
    return left;
  };

  ExprParser.prototype.parseUnary = function() {
    var t=this.peek();
    if (t.type==='OP' && (t.value==='-'||t.value==='+')) {
      var op=this.consume().value; return {type:'unop',op:op,operand:this.parsePower()};
    }
    if (t.type==='KW' && t.value==='not') {
      this.consume(); return {type:'unop',op:'not',operand:this.parsePower()};
    }
    return this.parsePower();
  };

  ExprParser.prototype.parsePower = function() {
    var left = this.parsePostfix();
    if (this.peek().type==='OP' && this.peek().value==='**') {
      this.consume(); return {type:'binop',op:'**',left:left,right:this.parseUnary()};
    }
    return left;
  };

  ExprParser.prototype.parsePostfix = function() {
    var expr = this.parsePrimary();
    while (true) {
      var t = this.peek();
      if (t.type==='OP' && t.value==='(') {
        // function call
        this.consume();
        var args=[], kwargs=[];
        while (this.peek().type!=='OP'||this.peek().value!==')') {
          var t2=this.peek();
          if (t2.type==='EOF') break;
          // check for keyword arg: name=
          if ((t2.type==='NAME'||t2.type==='KW') && this.tokens[this.pos+1] && this.tokens[this.pos+1].type==='OP' && this.tokens[this.pos+1].value==='=') {
            var kname=this.consume().value; this.consume();
            kwargs.push({key:kname, value:this.parseTernary()});
          } else if (t2.type==='OP' && t2.value==='*') {
            this.consume(); args.push(this.parseTernary()); // simplified *args
          } else if (t2.type==='OP' && t2.value==='**') {
            this.consume(); this.parseTernary(); // skip **kwargs
          } else {
            args.push(this.parseTernary());
          }
          if (this.peek().type==='OP'&&this.peek().value===',') this.consume();
          else break;
        }
        this.match('OP',')');
        expr = {type:'call', func:expr, args:args, kwargs:kwargs};
      } else if (t.type==='OP' && t.value==='[') {
        this.consume();
        // slice or index
        var hasColon = false;
        var start=null, stop=null, step=null;
        if (this.peek().type==='OP'&&this.peek().value===':') hasColon=true;
        else { start=this.parseTernary(); if(this.peek().type==='OP'&&this.peek().value===':') hasColon=true; }
        if (hasColon) {
          this.consume(); // ':'
          if (this.peek().type!=='OP'||(this.peek().value!==']'&&this.peek().value!==':')) stop=this.parseTernary();
          if (this.peek().type==='OP'&&this.peek().value===':') { this.consume(); if(this.peek().type!=='OP'||this.peek().value!==']') step=this.parseTernary(); }
          this.match('OP',']');
          expr = {type:'slice', obj:expr, start:start, stop:stop, step:step};
        } else {
          this.match('OP',']');
          expr = {type:'index', obj:expr, key:start};
        }
      } else if (t.type==='OP' && t.value==='.') {
        this.consume();
        var attr = this.consume().value;
        // method call?
        if (this.peek().type==='OP'&&this.peek().value==='(') {
          this.consume();
          var args=[], kwargs=[];
          while (this.peek().type!=='OP'||this.peek().value!==')') {
            var t2=this.peek(); if(t2.type==='EOF') break;
            if ((t2.type==='NAME'||t2.type==='KW') && this.tokens[this.pos+1] && this.tokens[this.pos+1].type==='OP' && this.tokens[this.pos+1].value==='=') {
              var kname=this.consume().value; this.consume(); kwargs.push({key:kname,value:this.parseTernary()});
            } else { args.push(this.parseTernary()); }
            if(this.peek().type==='OP'&&this.peek().value===',')this.consume(); else break;
          }
          this.match('OP',')');
          expr = {type:'call', func:{type:'attr',obj:expr,attr:attr}, args:args, kwargs:kwargs};
        } else {
          expr = {type:'attr', obj:expr, attr:attr};
        }
      } else break;
    }
    return expr;
  };

  ExprParser.prototype.parsePrimary = function() {
    var t = this.peek();
    if (!t || t.type==='EOF') return {type:'none'};

    if (t.type==='NUMBER') { this.consume(); return {type:'num', value:t.value}; }
    if (t.type==='STRING') { this.consume(); return t.fstr ? {type:'fstr',value:t.value} : {type:'str',value:t.value}; }
    if (t.type==='FSTRING') { this.consume(); return {type:'fstr', value:t.value}; }

    if (t.type==='KW') {
      if (t.value==='True') { this.consume(); return {type:'bool',value:true}; }
      if (t.value==='False'){ this.consume(); return {type:'bool',value:false}; }
      if (t.value==='None') { this.consume(); return {type:'none'}; }
      if (t.value==='lambda') {
        this.consume();
        var params=[];
        while (this.peek().type!=='OP'||this.peek().value!==':') {
          var pn=this.consume().value; params.push({name:pn});
          if(this.peek().type==='OP'&&this.peek().value===',') this.consume(); else break;
        }
        this.match('OP',':');
        var body=this.parseTernary();
        return {type:'lambda',params:params,body:body};
      }
      if (t.value==='not') { this.consume(); return {type:'unop',op:'not',operand:this.parsePrimary()}; }
      return {type:'name', name:t.value, isKw:true}; // fallback
    }

    if (t.type==='NAME') {
      this.consume();
      return {type:'name', name:t.value};
    }

    if (t.type==='OP') {
      // Parenthesized expression or tuple
      if (t.value==='(') {
        this.consume();
        if (this.peek().type==='OP'&&this.peek().value===')') { this.consume(); return {type:'tuple',elements:[]}; }
        var first = this.parseTernary();
        if (this.peek().type==='OP'&&this.peek().value===',') {
          var elements=[first];
          while (this.peek().type==='OP'&&this.peek().value===',') {
            this.consume();
            if(this.peek().type==='OP'&&this.peek().value===')') break;
            elements.push(this.parseTernary());
          }
          this.match('OP',')');
          return {type:'tuple',elements:elements};
        }
        // generator expression check
        if (this.peek().type==='KW'&&this.peek().value==='for') {
          // treat as list comprehension
          this.consume();
          var _savedIn=this.stopAtIn; this.stopAtIn=true;
          var target=this.parseOr();
          this.stopAtIn=_savedIn;
          this.match('KW','in');
          var iter=this.parseOr();
          var cond=null;
          if(this.peek().type==='KW'&&this.peek().value==='if'){this.consume();cond=this.parseOr();}
          this.match('OP',')');
          return {type:'list',element:first,elements:[],comp:{target:target,iter:iter,cond:cond}};
        }
        this.match('OP',')');
        return first;
      }

      // List literal or comprehension
      if (t.value==='[') {
        this.consume();
        if (this.peek().type==='OP'&&this.peek().value===']') { this.consume(); return {type:'list',elements:[]}; }
        var first=this.parseTernary();
        // list comprehension
        if (this.peek().type==='KW'&&this.peek().value==='for') {
          this.consume();
          var _savedIn=this.stopAtIn; this.stopAtIn=true;
          var target=this.parseOr();
          this.stopAtIn=_savedIn;
          this.match('KW','in');
          var iter=this.parseOr();
          var cond=null;
          if(this.peek().type==='KW'&&this.peek().value==='if'){this.consume();cond=this.parseOr();}
          this.match('OP',']');
          return {type:'list',element:first,elements:[],comp:{target:target,iter:iter,cond:cond}};
        }
        var elements=[first];
        while (this.peek().type==='OP'&&this.peek().value===',') {
          this.consume();
          if(this.peek().type==='OP'&&this.peek().value===']') break;
          elements.push(this.parseTernary());
        }
        this.match('OP',']');
        return {type:'list',elements:elements};
      }

      // Dict or set literal or comprehension
      if (t.value==='{') {
        this.consume();
        if (this.peek().type==='OP'&&this.peek().value==='}') { this.consume(); return {type:'dict',keys:[],values:[]}; }
        var firstKey=this.parseTernary();
        if (this.peek().type==='OP'&&this.peek().value===':') {
          // dict
          this.consume();
          var firstVal=this.parseTernary();
          // dict comprehension
          if(this.peek().type==='KW'&&this.peek().value==='for'){
            this.consume();
            var _si=this.stopAtIn; this.stopAtIn=true;
            var target=this.parseOr();
            this.stopAtIn=_si;
            this.match('KW','in');
            var iter=this.parseOr();
            var cond=null;
            if(this.peek().type==='KW'&&this.peek().value==='if'){this.consume();cond=this.parseOr();}
            this.match('OP','}');
            return {type:'dict',keys:[firstKey],values:[firstVal],comp:{target:target,iter:iter,cond:cond}};
          }
          var keys=[firstKey],values=[firstVal];
          while(this.peek().type==='OP'&&this.peek().value===','){
            this.consume();
            if(this.peek().type==='OP'&&this.peek().value==='}') break;
            keys.push(this.parseTernary());
            this.match('OP',':');
            values.push(this.parseTernary());
          }
          this.match('OP','}');
          return {type:'dict',keys:keys,values:values};
        } else {
          // set
          var elements=[firstKey];
          while(this.peek().type==='OP'&&this.peek().value===','){
            this.consume();
            if(this.peek().type==='OP'&&this.peek().value==='}') break;
            elements.push(this.parseTernary());
          }
          this.match('OP','}');
          return {type:'set',elements:elements};
        }
      }

      if (t.value==='-'||t.value==='+') { this.consume(); return {type:'unop',op:t.value,operand:this.parsePrimary()}; }
      if (t.value==='~') { this.consume(); return {type:'unop',op:'~',operand:this.parsePrimary()}; }
    }

    this.consume(); // skip unknown token
    return {type:'none'};
  };

  /* ── PUBLIC API ── */
  return {
    run: function(src, outputFn, inputFn) {
      try {
        var stmts = parseProgram(src);
        var interp = new Interpreter(outputFn, inputFn);
        interp.execBlock(stmts, interp.globals);
        return null;
      } catch(e) {
        if (e && e.etype) return e.etype + ': ' + e.msg;
        return 'Error: ' + String(e.message||e);
      }
    }
  };
})();


function refreshLN(id) {
  var ta = document.getElementById('ta-' + id);
  var ln = document.getElementById('ln-' + id);
  if (!ta || !ln) return;
  var n = ta.value.split('\n').length;
  var h = ''; for (var i = 1; i <= n; i++) h += i + '<br>';
  ln.innerHTML = h;
}

/* ─── RUNNER WRAPPER ─── */
var pyReady = true; // Always ready — no loading needed

function initPy() {
  document.querySelectorAll('.py-dot').forEach(function(d){ d.classList.add('ready'); });
  document.querySelectorAll('.py-status-txt').forEach(function(el){ el.textContent = 'พร้อม'; });
  document.querySelectorAll('.btn-run').forEach(function(b){ b.disabled = false; });
}

function runCode(id) {
  var ta  = document.getElementById('ta-' + id);
  var out = document.getElementById('out-' + id);
  if (!ta || !out) return;
  var code = ta.value;
  if (!code.trim()) { out.textContent = '(ไม่มีโค้ด)'; out.className = 'run-out idle'; return; }

  var buf = '';

  // input() prompts the user ON DEMAND — exactly when Python calls it.
  // This avoids miscounting 'input' text inside comments or strings.
  var error = MiniPython.run(
    code,
    function(text) { buf += text; },
    function(prompt) {
      var label = String(prompt || '').trim() || 'ใส่ค่า';
      var v = window.prompt(label);
      if (v === null) v = '';
      buf += String(prompt || '') + v + '\n';
      return v;
    }
  );

  if (error) {
    out.textContent = '❌ ' + error;
    out.className = 'run-out err';
  } else if (!buf.trim()) {
    out.textContent = '(รันเสร็จ — ไม่มี output)';
    out.className = 'run-out idle';
  } else {
    out.textContent = buf;
    out.className = 'run-out ok';
  }
}

/* ─── EDITOR INJECTOR ─── */
function injectEditor(container, chapterId) {
  var def = (editorDefaults || {})[chapterId];
  if (!def) return;
  var code = def.code, label = def.label;
  var id = 'e' + chapterId;

  window._edDefaults = window._edDefaults || {};
  window._edDefaults[id] = code;

  // Count lines for height
  var lineCount = code.split('\n').length;
  var minH = Math.max(120, lineCount * 22 + 28);

  // Build DOM elements directly
  var wrap = document.createElement('div');
  wrap.className = 'editor-wrap';

  // Top bar
  var topbar = document.createElement('div');
  topbar.className = 'editor-topbar';

  var lbl = document.createElement('span');
  lbl.className = 'editor-label';
  lbl.textContent = '✎ ' + label;

  var acts = document.createElement('div');
  acts.className = 'editor-actions';

  var statusWrap = document.createElement('div');
  statusWrap.className = 'pyodide-status';
  var dot = document.createElement('span');
  dot.className = 'py-dot ready';
  var stxt = document.createElement('span');
  stxt.className = 'py-status-txt';
  stxt.textContent = 'พร้อม';
  statusWrap.appendChild(dot);
  statusWrap.appendChild(stxt);

  var btnReset = document.createElement('button');
  btnReset.className = 'btn-reset';
  btnReset.textContent = '↺ รีเซ็ต';
  btnReset.onclick = function() { resetCode(id); };

  var btnRun = document.createElement('button');
  btnRun.className = 'btn-run';
  btnRun.textContent = '▶ Run';
  btnRun.disabled = false;
  btnRun.onclick = function() { runCode(id); };

  acts.appendChild(statusWrap);
  acts.appendChild(btnReset);
  acts.appendChild(btnRun);
  topbar.appendChild(lbl);
  topbar.appendChild(acts);

  // Editor body
  var body = document.createElement('div');
  body.className = 'editor-body';

  var ln = document.createElement('div');
  ln.className = 'line-nums';
  ln.id = 'ln-' + id;
  var lnHtml = ''; for (var i = 1; i <= lineCount; i++) lnHtml += i + '<br>';
  ln.innerHTML = lnHtml;

  var ta = document.createElement('textarea');
  ta.className = 'code-ta';
  ta.id = 'ta-' + id;
  ta.value = code;
  ta.spellcheck = false;
  ta.setAttribute('autocomplete', 'off');
  ta.setAttribute('autocorrect', 'off');
  ta.setAttribute('autocapitalize', 'off');
  ta.style.minHeight = minH + 'px';

  ta.addEventListener('input', function() { refreshLN(id); });
  ta.addEventListener('scroll', function() { ln.scrollTop = ta.scrollTop; });
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(en);
      ta.selectionStart = ta.selectionEnd = s + 4;
      refreshLN(id);
    }
  });

  body.appendChild(ln);
  body.appendChild(ta);

  // Output
  var outArea = document.createElement('div');
  outArea.className = 'out-area';

  var outBar = document.createElement('div');
  outBar.className = 'out-bar';
  var outLbl = document.createElement('span');
  outLbl.textContent = 'Output';
  var clearB = document.createElement('button');
  clearB.className = 'clear-btn';
  clearB.textContent = 'ล้าง';
  clearB.onclick = function() { clearOut(id); };
  outBar.appendChild(outLbl);
  outBar.appendChild(clearB);

  var outDiv = document.createElement('div');
  outDiv.className = 'run-out idle';
  outDiv.id = 'out-' + id;
  outDiv.textContent = 'กด ▶ Run เพื่อรันโค้ด';

  outArea.appendChild(outBar);
  outArea.appendChild(outDiv);

  wrap.appendChild(topbar);
  wrap.appendChild(body);
  wrap.appendChild(outArea);

  container.appendChild(wrap);
}

/* ─── SIDEBAR ─── */
function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var cats = {};
  chapters.forEach(function(c) {
    if (!cats[c.cat]) cats[c.cat] = [];
    cats[c.cat].push(c);
  });
  var html = '';
  Object.keys(cats).forEach(function(cat) {
    html += '<div class="cat-label">' + cat + '</div>';
    cats[cat].forEach(function(c) {
      html += '<button class="nav-item" id="ni' + c.id + '" onclick="goTo(' + c.id + ')">'
        + '<span class="nav-dot"></span>'
        + '<span class="nav-num">' + (c.id === 0 ? '🏠' : c.id) + '</span>'
        + (c.id === 0 ? 'ภาพรวม' : c.title)
        + '</button>';
    });
  });
  sb.innerHTML = html;
}

/* ─── INDEX PAGE ─── */
function buildIndex() {
  var g = '<div class="idx-grid">';
  chapters.forEach(function(c) {
    if (c.id === 0) return;
    g += '<div class="idx-card' + (done.has(c.id) ? ' done-card' : '') + '" id="ic' + c.id + '" onclick="goTo(' + c.id + ')">'
      + '<div class="idx-num">บทที่ ' + c.id + '</div>'
      + '<div class="idx-name">' + c.icon + ' ' + c.title + '</div>'
      + '<div class="idx-tag">✓ เรียนแล้ว</div>'
      + '</div>';
  });
  return g + '</div>';
}

        btn.textContent = 'คัดลอกแล้ว ✓'; btn.classList.add('ok');
        setTimeout(function() { btn.textContent = 'คัดลอก'; btn.classList.remove('ok'); }, 2000);
      });

  mc.querySelectorAll('.quiz-opt').forEach(function(btn) {
    if (!btn.dataset.bound) {
      btn.dataset.bound = '1';
      btn.addEventListener('click', function() {
        var correct = btn.dataset.correct === 'true';
        var opts = btn.closest('.quiz-opts').querySelectorAll('.quiz-opt');
        opts.forEach(function(o) { o.disabled = true; });
        var fb = btn.closest('.quiz-body').querySelector('.quiz-fb');

function goTo(id) {
  cur = id;
  renderPage(id);
  document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
  var ni = document.getElementById('ni' + id);
  if (ni) ni.classList.add('active');
  window.scrollTo(0, 0);
}

function markDone(id) {
  done.add(id);
  var bd = document.getElementById('bd' + id);
  if (bd) { bd.textContent = '✓ เรียนแล้ว'; bd.classList.add('marked'); }
  var ni = document.getElementById('ni' + id);
  if (ni) ni.classList.add('done');
  var ic = document.getElementById('ic' + id);
  if (ic) ic.classList.add('done-card');
  updateProgress();
}

function updateProgress() {
  var d = done.size;
  document.getElementById('doneCount').textContent = d;
  document.getElementById('progFill').style.width = Math.round(d / 34 * 100) + '%';
}

function doSearch(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.nav-item').forEach(function(b) {
    b.style.display = (!q || b.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
  document.querySelectorAll('.cat-label').forEach(function(l) {
    var next = l.nextElementSibling, any = false;
    while (next && next.classList.contains('nav-item')) {
      if (next.style.display !== 'none') any = true;
      next = next.nextElementSibling;
    }
    l.style.display = any ? '' : 'none';
  });
}

// Fix quiz: store correct flag in data attribute during HTML generation
// (already handled in Python generator below)

buildSidebar();
renderPage(0);
