<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ครูกอล์ฟ — เรียนเขียนโปรแกรมสำหรับเด็กไทย</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* responsive */
    @media (max-width: 1000px) {
      .hero-grid, .detail-hero, .detail-body, .lesson-grid { grid-template-columns: 1fr !important; }
      .steps-grid, .course-grid { grid-template-columns: 1fr 1fr !important; }
      .detail-body aside, .lesson-grid aside { position: static !important; }
      footer .wrap[style*="grid"] { grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 720px) {
      .wrap { padding: 0 20px !important; }
      .nav-links, .nav-cta { display: none !important; }
      .nav-burger { display: block !important; }
      .steps-grid, .course-grid { grid-template-columns: 1fr !important; }
      footer .wrap[style*="grid"] { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail">

      <rect width="100" height="100" rx="20" fill="#F1E8D7"/>

      <path d="M45 44 L40 50 L45 56 M55 44 L60 50 L55 56" stroke="#FCF8F0" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="70" cy="30" r="7" fill="#E26D5C"/>
    </svg>
  </template>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
