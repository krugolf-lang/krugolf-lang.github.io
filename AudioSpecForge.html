// หมวดไหนปรับจำนวนแยกซ้าย/ขวา หรือเดี่ยว
const QTY_MAP = {
  driver: [["driverL", "ซ้าย (L)"], ["driverR", "ขวา (R)"]],
  tweeter: [["tweeterL", "ซ้าย (L)"], ["tweeterR", "ขวา (R)"]],
  subDriver: [["subDriver", "จำนวน"]],
};

const find = (list, id) => list.find((x) => x.id === id);

function analyze(sel) {
  const amp = find(AMPS, sel.amp);
  const subAmp = find(SUBAMPS, sel.subAmp);
  const driver = find(FULLRANGE, sel.driver);
  const tweeter = find(TWEETERS, sel.tweeter);
  const subDriver = find(SUBWOOFERS, sel.subDriver);
  const battery = find(BATTERIES, sel.battery);

  const issues = [];
  let score = 100;
  const add = (level, text) => {
    issues.push({ level, text });
    if (level === "error") score -= 40;
    else if (level === "warn") score -= 13;
    else if (level === "info") score -= 4;
  };

  // power source (แบตเตอรี่อย่างเดียว)
  const hasBat = battery && battery.nominalV > 0;
  let supplyV = 0;
  if (hasBat) supplyV = battery.nominalV;
  else add("error", "ยังไม่ได้เลือกแบตเตอรี่ — ต้องเลือกแบตอย่างน้อย 1 ก้อน");

  if (!amp) add("error", "ยังไม่ได้เลือกบอร์ดแอมป์");
  if (!driver) add("error", "ยังไม่ได้เลือกดอกฟูลเรนจ์");

  // voltage range
  if (amp && supplyV > 0) {
    if (supplyV < amp.vMin)
      add("error", `ไฟเลี้ยง ${supplyV}V ต่ำกว่าที่ ${amp.name} ต้องการ (${amp.vMin}–${amp.vMax}V) แอมป์อาจไม่ทำงานเต็มกำลัง`);
    else if (supplyV > amp.vMax)
      add("error", `ไฟเลี้ยง ${supplyV}V เกินพิกัด ${amp.name} (สูงสุด ${amp.vMax}V) เสี่ยงบอร์ดพัง!`);
  }

  // impedance
  if (amp && driver && driver.impedance < amp.minImp)
    add("error", `ดอกลำโพง ${driver.impedance}Ω ต่ำกว่าโหลดต่ำสุดของแอมป์ (${amp.minImp}Ω) เสี่ยงแอมป์ร้อน/ตัดการทำงาน`);

  // กำลังขับตามสเปคบอร์ด (rated)
  const mainCh = amp ? (amp.type === "mono" ? 1 : amp.type === "preamp" ? 0 : 2) : 0;
  const estPerCh = amp ? amp.ratedW : 0;
  const subEst = amp && amp.type === "2.1" ? amp.subW : 0;
  const q = sel.qty || {};
  const hasTw = tweeter && tweeter.id !== "tw_none";
  const qv = (k, def) => (q[k] != null ? q[k] : def);
  const qDL = driver ? qv("driverL", 1) : 0;
  const qDR = driver ? qv("driverR", 1) : 0;
  const qTwL = hasTw ? qv("tweeterL", 1) : 0;
  const qTwR = hasTw ? qv("tweeterR", 1) : 0;
  const lWatt = (driver ? driver.powerW * qDL : 0) + (hasTw ? tweeter.powerW * qTwL : 0);
  const rWatt = (driver ? driver.powerW * qDR : 0) + (hasTw ? tweeter.powerW * qTwR : 0);
  if (amp && driver) {
    const lowSides = [];
    if (estPerCh > lWatt * 1.05) lowSides.push(`ซ้าย ${Math.round(lWatt)}W`);
    if (estPerCh > rWatt * 1.05) lowSides.push(`ขวา ${Math.round(rWatt)}W`);
    if (lowSides.length)
      add("warn", `บอร์ดแอมป์จ่าย ${estPerCh}W ต่อข้าง สูงกว่าวัตต์ดอกลำโพง (${lowSides.join(" · ")}) — เปิดดังเกินอาจทำดอกพัง`);
  }

  // board-type guidance (ไม่หักคะแนน)
  if (amp && amp.type === "preamp")
    add("warn", `${amp.name} เป็นบอร์ดรับบลูทูธ/ปรีแอมป์ ไม่มีภาคขยายกำลัง ต้องต่อเพาเวอร์แอมป์เพิ่มเพื่อขับลำโพง`);
  if (amp && amp.type === "2.1")
    issues.push({ level: "info", text: `บอร์ด 2.1 มีแชนแนลซับแยก (~${subEst || amp.subW}W) ต้องเตรียมดอกซับวูฟเฟอร์เพิ่มต่างหากจากดอก L/R` });
  if (amp && amp.type === "mono")
    issues.push({ level: "info", text: "บอร์ดโมโน ขับได้ 1 แชนแนล เหมาะทำตู้ซับ — ดอกลำโพงคู่จะใช้เพียงข้างเดียวหรือต่อพ่วงตามอิมพีแดนซ์ที่แอมป์รับได้" });
  if (amp && amp.bt && amp.type !== "preamp")
    issues.push({ level: "info", text: "บอร์ดนี้รับบลูทูธในตัว ต่อมือถือ/แท็บเล็ตได้เลยไม่ต้องมีโมดูลแยก" });

  // subwoofer amp (อุปกรณ์เสริม)
  const hasSub = subAmp && subAmp.id !== "sub_none";
  let subAmpOut = 0;
  if (hasSub) {
    if (supplyV > 0) {
      if (supplyV < subAmp.vMin)
        add("error", `ไฟเลี้ยง ${supplyV}V ต่ำกว่าที่ซับแอมป์ ${subAmp.name} ต้องการ (${subAmp.vMin}–${subAmp.vMax}V)`);
      else if (supplyV > subAmp.vMax)
        add("error", `ไฟเลี้ยง ${supplyV}V เกินพิกัดซับแอมป์ ${subAmp.name} (สูงสุด ${subAmp.vMax}V) เสี่ยงบอร์ดพัง!`);
      const ch = subAmp.type === "mono" ? 1 : 2;
      subAmpOut = subAmp.ratedW * ch + subAmp.subW;
    }
    issues.push({ level: "info", text: `ซับแอมป์ ${subAmp.name}: ต้องเตรียมดอกซับวูฟเฟอร์แยก (โหลดต่ำสุด ${subAmp.minImp}Ω) จ่ายไฟ ${subAmp.vMin}–${subAmp.vMax}V` });
  }

  // speaker driver pairing (ดอกซับ / ทวีตเตอร์)
  const hasSubDriver = subDriver && subDriver.id !== "sd_none";
  const subCapable = hasSub || (amp && amp.type === "2.1");
  if (hasSubDriver && subCapable) {
    const subMinImp = hasSub ? subAmp.minImp : (amp ? amp.minImp : 4);
    if (subDriver.impedance < subMinImp)
      add("error", `ดอกซับ ${subDriver.impedance}Ω ต่ำกว่าโหลดต่ำสุดของภาคขยายซับ (${subMinImp}Ω) เสี่ยงแอมป์ร้อน/ตัด`);
  }
  if (hasSub && !hasSubDriver)
    issues.push({ level: "info", text: "เลือกซับแอมป์แล้ว อย่าลืมเลือกดอกซับวูฟเฟอร์ด้วย" });
  if (hasSubDriver && !subCapable)
    issues.push({ level: "info", text: "มีดอกซับแต่ยังไม่มีภาคขยายซับ — เลือกบอร์ด 2.1 หรือซับแอมป์เพื่อขับดอกซับ" });
  if (hasTw)
    issues.push({ level: "info", text: "ทวีตเตอร์ต้องต่อผ่านครอสโอเวอร์/คาปาซิเตอร์กับวูฟเฟอร์ (ระบบ 2 ทาง)" });

  if (issues.filter((i) => i.level === "error").length === 0 &&
      issues.filter((i) => i.level === "warn").length === 0)
    add("ok", "อุปกรณ์เข้ากันได้ดี พร้อมลงมือประกอบ!");

  // power & runtime
  const totalOut = estPerCh * mainCh;
  const drawOut = totalOut + subEst + subAmpOut;
  const avgDraw = amp ? amp.idleW + (hasSub ? subAmp.idleW : 0) + 0.8 + (drawOut * 0.12) / 0.85 : 0;
  const peakDraw = amp ? amp.idleW + (hasSub ? subAmp.idleW : 0) + drawOut / 0.85 : 0;
  let runtimeH = 0;
  if (hasBat && avgDraw > 0) {
    const wh = (battery.nominalV * battery.mAh) / 1000;
    runtimeH = (wh * 0.85) / avgDraw;
  }

  const parts = [amp, hasSub ? subAmp : null, battery].filter(Boolean);
  const qSubDriver = hasSubDriver ? qv("subDriver", subDriver.qty || 1) : 0;
  let totalPrice = parts.reduce((s, p) => s + p.price, 0);
  let totalWeight = parts.reduce((s, p) => s + p.weight, 0);
  if (driver) { totalPrice += driver.price * (qDL + qDR); totalWeight += driver.weight * (qDL + qDR); }
  if (hasTw) { totalPrice += tweeter.price * (qTwL + qTwR); totalWeight += tweeter.weight * (qTwL + qTwR); }
  if (hasSubDriver) { totalPrice += subDriver.price * qSubDriver; totalWeight += subDriver.weight * qSubDriver; }
  const subWatt = hasSubDriver ? subDriver.powerW * qSubDriver : 0;
  const driverWatt = lWatt + rWatt + subWatt;

  return {
    amp, subAmp: hasSub ? subAmp : null, battery, hasBat,
    driver, tweeter: hasTw ? tweeter : null, subDriver: hasSubDriver ? subDriver : null,
    qDL, qDR, qTwL, qTwR, qSubDriver, lWatt, rWatt, subWatt, driverWatt,
    issues, score: Math.max(0, Math.round(score)),
    supplyV, estPerCh: Math.round(estPerCh), totalOut: Math.round(totalOut), subEst, subAmpOut, mainCh,
    avgDraw, peakDraw, runtimeH, totalPrice, totalWeight,
  };
}

          </div>
          <nav style={{ display: "flex", gap: 6, background: COLORS.panel, padding: 5, borderRadius: 12, border: `1px solid ${COLORS.line}` }}>
            {[["build", "จัดสเป็ค", Layers], ["compare", "เทียบสเป็ค", Activity]].map(([k, label, Ic]) => (
              <button key={k} onClick={() => setTab(k)}
                className="asf-display"
                style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 16px", borderRadius: 9, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 600,
                  background: tab === k ? COLORS.amber : "transparent", color: tab === k ? "#1a1208" : COLORS.muted }}>
                <Ic size={16} /> {label}
              </button>
            ))}
          </nav>
        </header>

        {tab === "build" ? (
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr)", gap: 22, marginTop: 22 }} className="asf-build">
            <style>{`@media(min-width:980px){.asf-build{grid-template-columns:1fr 360px !important}}`}</style>

            {/* LEFT: pickers */}
            <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
              {CATS.map((cat, ci) => {
                const Ic = cat.icon;
                return (
                  <section key={cat.key} className="fade" style={{ animationDelay: `${ci * 60}ms` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 10 }}>
                      <Ic size={17} color={COLORS.amber} />
                      <h3 className="asf-display" style={{ fontSize: 15.5, fontWeight: 600, margin: 0 }}>{cat.label}</h3>
                      {cat.required && <span style={{ fontSize: 10.5, color: COLORS.err, border: `1px solid ${COLORS.err}55`, padding: "1px 7px", borderRadius: 20 }}>จำเป็น</span>}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(168px,1fr))", gap: 10 }}>
                      {cat.list.map((opt) => {
                        const active = sel[cat.key] === opt.id;
                        return (
                          <button key={opt.id} onClick={() => pick(cat.key, opt.id)}
                            className={"asf-card" + (active ? " asf-glow" : "")}
                            style={{ textAlign: "left", cursor: "pointer", padding: "12px 13px", borderRadius: 12,
                              color: COLORS.text,
                              background: active ? COLORS.panel2 : COLORS.panel,
                              border: `1px solid ${active ? COLORS.amber + "88" : COLORS.line}` }}>
                            <div style={{ display: "flex", justifyContent: "space-between", gap: 6, alignItems: "flex-start" }}>
                              <span style={{ fontSize: 13.5, fontWeight: 600, lineHeight: 1.25 }}>{opt.name}</span>
                              {active && <CheckCircle2 size={16} color={COLORS.amber} style={{ flexShrink: 0 }} />}
                            </div>
                            <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 4 }}>{opt.brand !== "—" ? opt.brand : "\u00A0"}</div>
                            {opt.type && opt.type !== "none" && (
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                                <span style={{ fontSize: 9.5, fontWeight: 600, color: COLORS.amberSoft, border: `1px solid ${COLORS.amber}55`, padding: "1px 6px", borderRadius: 20 }}>
                                  {opt.type === "2.1" ? "2.1 ch" : opt.type === "mono" ? "โมโน" : opt.type === "preamp" ? "ปรีแอมป์" : "สเตอริโอ"}
                                </span>
                                {opt.bt && <span style={{ fontSize: 9.5, fontWeight: 600, color: COLORS.cyan, border: `1px solid ${COLORS.cyan}55`, padding: "1px 6px", borderRadius: 20 }}>BT ในตัว</span>}
                                {opt.app && <span style={{ fontSize: 9.5, fontWeight: 600, color: COLORS.cyan, border: `1px solid ${COLORS.cyan}55`, padding: "1px 6px", borderRadius: 20 }}>App</span>}
                              </div>
                            )}
                            {opt.impedance !== undefined && opt.powerW !== undefined && !opt.id.endsWith("_none") && (
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                                <span style={{ fontSize: 9.5, fontWeight: 700, color: COLORS.amberSoft, border: `1px solid ${COLORS.amber}55`, padding: "1px 6px", borderRadius: 20 }}>{opt.impedance}Ω</span>
                                <span style={{ fontSize: 9.5, fontWeight: 600, color: COLORS.muted, border: `1px solid ${COLORS.line}`, padding: "1px 6px", borderRadius: 20 }}>{opt.powerW}W</span>
                                <span style={{ fontSize: 9.5, fontWeight: 600, color: COLORS.muted, border: `1px solid ${COLORS.line}`, padding: "1px 6px", borderRadius: 20 }}>{opt.size}</span>
                              </div>
                            )}
                            <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 7, lineHeight: 1.4, minHeight: 32 }}>{opt.note}</div>
                            <div className="asf-mono" style={{ fontSize: 13, fontWeight: 700, color: active ? COLORS.amber : COLORS.text, marginTop: 6 }}>
                              {opt.price > 0 ? (opt.qty !== undefined ? `${baht(opt.price)} /ดอก` : baht(opt.price)) : "ฟรี / —"}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                    {QTY_MAP[cat.key] && (() => {
                      const selItem = find(cat.list, sel[cat.key]);
                      if (!selItem || selItem.qty === undefined || selItem.id.endsWith("_none")) return null;
                      const sBtn = { width: 32, height: 30, border: "none", cursor: "pointer", background: COLORS.panel2, color: COLORS.amber, fontSize: 17, fontWeight: 700, lineHeight: 1 };
                      const keys = QTY_MAP[cat.key];
                      return (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginTop: 11, alignItems: "center" }}>
                          {keys.map(([k, lbl]) => {
                            const qv = sel.qty[k] || 0;
                            return (
                              <div key={k} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <span style={{ fontSize: 12, color: COLORS.muted, minWidth: 44 }}>{lbl}</span>
                                <div style={{ display: "flex", alignItems: "center", border: `1px solid ${COLORS.line}`, borderRadius: 9, overflow: "hidden" }}>
                                  <button onClick={() => setQty(k, -1)} style={sBtn}>−</button>
                                  <span className="asf-mono" style={{ minWidth: 34, textAlign: "center", fontWeight: 700, fontSize: 14, color: COLORS.text }}>{qv}</span>
                                  <button onClick={() => setQty(k, 1)} style={sBtn}>+</button>
                                </div>
                              </div>
                            );
                          })}
                          <span className="asf-mono" style={{ fontSize: 12, color: COLORS.amberSoft }}>
                            รวม {baht(selItem.price * keys.reduce((s, [k]) => s + (sel.qty[k] || 0), 0))} · รับ {selItem.powerW * keys.reduce((s, [k]) => s + (sel.qty[k] || 0), 0)}W
                          </span>
                        </div>
                      );
                    })()}
                  </section>
                );
              })}
            </div>

            {/* RIGHT: live summary */}
            <aside style={{ position: "sticky", top: 14, alignSelf: "start", display: "flex", flexDirection: "column", gap: 14 }}>
              {/* TOTAL WATTS */}
              <div className="asf-glow" style={{ background: COLORS.panel2, border: `1px solid ${COLORS.amber}55`, borderRadius: 16, padding: "16px 18px" }}>
                <span className="asf-display" style={{ fontSize: 13, color: COLORS.amberSoft, display: "flex", alignItems: "center", gap: 7 }}>
                  <Speaker size={15} color={COLORS.amber} /> วัตต์ดอกลำโพง (แยกข้าง)
                </span>
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  {[["ซ้าย (L)", A.lWatt, A.qDL, A.qTwL], ["ขวา (R)", A.rWatt, A.qDR, A.qTwR]].map(([lbl, w, qd, qtw]) => (
                    <div key={lbl} style={{ flex: 1, background: COLORS.panel, border: `1px solid ${COLORS.line}`, borderRadius: 11, padding: "9px 11px" }}>
                      <div style={{ fontSize: 11, color: COLORS.muted }}>ดอกลำโพง {lbl}</div>
                      <div className="asf-mono" style={{ fontSize: 23, fontWeight: 700, color: COLORS.amber, lineHeight: 1.1 }}>{w}<span style={{ fontSize: 13 }}> W</span></div>
                      <div style={{ fontSize: 10, color: COLORS.muted }}>ฟูล {qd}{A.tweeter ? ` + แหลม ${qtw}` : ""} ดอก</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8, background: COLORS.panel, border: `1px solid ${COLORS.line}`, borderRadius: 11, padding: "8px 11px" }}>
                  <span style={{ fontSize: 11.5, color: COLORS.muted }}>ดอกซับวูฟเฟอร์ (.1)</span>
                  <span className="asf-mono" style={{ fontSize: 17, fontWeight: 700, color: A.subWatt ? COLORS.amber : COLORS.muted }}>{A.subWatt} W <span style={{ fontSize: 10.5, color: COLORS.muted }}>{A.subDriver ? `· ${A.qSubDriver} ดอก` : "· ไม่มี"}</span></span>
                </div>
                <div style={{ fontSize: 11, color: COLORS.muted, marginTop: 8 }}>
                  {A.amp && A.amp.type !== "preamp"
                    ? `บอร์ดแอมป์: ${A.estPerCh}W/ข้าง${A.subEst ? ` · ช่องซับบอร์ด ${A.subEst}W` : ""}${A.subAmp ? ` · ซับแอมป์ ${A.subAmpOut}W` : ""}`
                    : "ปรีแอมป์ (ไม่มีภาคขยายกำลัง)"}
                </div>
              </div>

              {/* VU + score */}
              <div style={{ background: COLORS.panel, border: `1px solid ${COLORS.line}`, borderRadius: 16, padding: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span className="asf-display" style={{ fontSize: 13, color: COLORS.muted }}>สถานะระบบ</span>
                  <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, fontWeight: 600, color: statusColor }}>
                    {errCount > 0 ? <AlertTriangle size={14} /> : <CheckCircle2 size={14} />}
                    {errCount > 0 ? "มีปัญหา" : A.score >= 90 ? "พร้อมประกอบ" : "ใช้ได้ มีข้อควรระวัง"}
                  </span>
                </div>
                <div style={{ display: "flex", alignItems: "flex-end", gap: 14, marginTop: 12 }}>
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 56, padding: "0 4px" }}>
                    {[0,1,2,3,4,5,6].map((i) => (
                      <div key={i} className="vu-bar" style={{ animationDelay: `${i * 0.12}s`, opacity: errCount > 0 ? 0.35 : 1 }} />
                    ))}
                  </div>
                  <div style={{ marginLeft: "auto", textAlign: "right" }}>
                    <div className="asf-mono" style={{ fontSize: 30, fontWeight: 700, color: statusColor, lineHeight: 1 }}>{A.score}</div>
                    <div style={{ fontSize: 11, color: COLORS.muted }}>คะแนนความเข้ากัน</div>
                  </div>
                </div>
              </div>

              {/* metrics */}
              <div style={{ background: COLORS.panel, border: `1px solid ${COLORS.line}`, borderRadius: 16, padding: 6 }}>
                {[
                  [Gauge, "กำลังขับ (สเปคบอร์ด)",
                    A.amp && A.amp.type === "preamp" ? "ปรีแอมป์" : `${A.estPerCh}W ×${A.mainCh}`,
                    A.amp && A.amp.type === "preamp" ? "ไม่มีภาคขยายกำลัง" : A.subEst ? `+ ซับ ${A.subEst}W = รวม ${A.totalOut + A.subEst}W` : `รวม ${A.totalOut}W ตามสเปคบอร์ด`],
                  ...(A.subAmp ? [[Waves, "ขยายซับวูฟเฟอร์", `~${A.subAmpOut}W`, A.subAmp.name]] : []),
                  [Clock, "ใช้งานต่อเนื่อง", A.hasBat ? `~${A.runtimeH.toFixed(1)} ชม.` : "—", A.hasBat ? "ระดับฟังปกติ" : "เลือกแบตก่อน"],
                  [Scale, "น้ำหนักอุปกรณ์", `~${A.totalWeight} g`, "ยังไม่รวมตู้/สายไฟ"],
                  [Wallet, "ราคารวม", baht(A.totalPrice), "เฉพาะอุปกรณ์อิเล็กฯ"],
                ].map(([Ic, label, big, sub], i, arr) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 12px", borderBottom: i < arr.length - 1 ? `1px solid ${COLORS.line}` : "none" }}>
                    <Ic size={18} color={COLORS.amber} style={{ flexShrink: 0 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11.5, color: COLORS.muted }}>{label}</div>
                      <div style={{ fontSize: 10.5, color: COLORS.muted, opacity: .8 }}>{sub}</div>
                    </div>
                    <div className="asf-mono" style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>{big}</div>
                  </div>
                ))}
              </div>

              {/* compatibility */}
              <div style={{ background: COLORS.panel, border: `1px solid ${COLORS.line}`, borderRadius: 16, padding: 14 }}>
                <div className="asf-display" style={{ fontSize: 13, color: COLORS.muted, marginBottom: 9, display: "flex", alignItems: "center", gap: 7 }}>
                  <Sparkles size={14} color={COLORS.amber} /> ผลตรวจความเข้ากัน
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {A.issues.map((it, i) => {
                    const c = it.level === "error" ? COLORS.err : it.level === "warn" ? COLORS.warn : it.level === "ok" ? COLORS.ok : COLORS.cyan;
                    const Ic = it.level === "error" ? AlertTriangle : it.level === "warn" ? AlertTriangle : it.level === "ok" ? CheckCircle2 : Info;
                    return (
                      <div key={i} style={{ display: "flex", gap: 9, fontSize: 12, lineHeight: 1.45, color: COLORS.text }}>
                        <Ic size={15} color={c} style={{ flexShrink: 0, marginTop: 1 }} />
                        <span>{it.text}</span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* actions */}
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={doCopy} className="asf-display"
                  style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, padding: "12px", borderRadius: 11, border: "none", cursor: "pointer", fontSize: 13.5, fontWeight: 600, background: COLORS.amber, color: "#1a1208" }}>
                  <Copy size={15} /> {copied ? "คัดลอกแล้ว!" : "คัดลอกสเป็ค"}
                </button>
                <button onClick={doDownload} title="ดาวน์โหลด JSON"
                  style={{ padding: "12px 14px", borderRadius: 11, cursor: "pointer", border: `1px solid ${COLORS.line}`, background: COLORS.panel, color: COLORS.text }}>
                  <Download size={16} />
                </button>
                <button onClick={() => setSel(DEFAULT_SEL)} title="รีเซ็ต"
                  style={{ padding: "12px 14px", borderRadius: 11, cursor: "pointer", border: `1px solid ${COLORS.line}`, background: COLORS.panel, color: COLORS.text }}>
                  <RotateCcw size={16} />
                </button>
              </div>
            </aside>
          </div>
        ) : (
          /* ================= COMPARE TAB ================= */
          <div style={{ marginTop: 22 }} className="fade">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
              {CATS.map((c) => {
                const Ic = c.icon;
                const active = cmpCat === c.key;
                return (
                  <button key={c.key} onClick={() => setCmpCat(c.key)} className="asf-display"
                    style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 14px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 600,
                      border: `1px solid ${active ? COLORS.amber + "88" : COLORS.line}`, background: active ? COLORS.panel2 : COLORS.panel, color: active ? COLORS.amber : COLORS.muted }}>
                    <Ic size={15} /> {c.label}
                  </button>
                );
              })}
            </div>
            <CompareTable cat={CATS.find((c) => c.key === cmpCat)} selectedId={sel[cmpCat]} onPick={(id) => { pick(cmpCat, id); setTab("build"); }} />
            <p style={{ fontSize: 12, color: COLORS.muted, marginTop: 16, display: "flex", alignItems: "center", gap: 6 }}>
              <Music size={13} color={COLORS.amber} /> แตะปุ่ม "เลือก" เพื่อใส่อุปกรณ์ลงสเป็คแล้วกลับไปดูผลคำนวณ
            </p>
          </div>
        )}

        <footer style={{ marginTop: 40, paddingTop: 16, borderTop: `1px solid ${COLORS.line}`, fontSize: 11.5, color: COLORS.muted, lineHeight: 1.6 }}>
          ตัวเลขกำลังขับ/แบตเตอรี่เป็น <b style={{ color: COLORS.amberSoft }}>ค่าประมาณการ</b> สำหรับวางแผนเบื้องต้น
          ราคาเป็น <b style={{ color: COLORS.amberSoft }}>ราคาอ้างอิงตลาด (โดยประมาณ)</b> อาจต่างจากราคาร้านจริง แก้ไข/เพิ่มสินค้าได้ในไฟล์โค้ด · Audio Spec Forge
        </footer>
      </div>
    </div>
  );
}

function CompareTable({ cat, selectedId, onPick }) {
  const specKeys = {
    amp: [["type", "ชนิด"], ["ratedW", "วัตต์/ข้าง"], ["subW", "ซับ (W)"], ["minImp", "โหลดต่ำสุด (Ω)"], ["vMin", "ไฟต่ำสุด (V)"], ["vMax", "ไฟสูงสุด (V)"], ["idleW", "กินไฟ idle (W)"]],
    subAmp: [["type", "ชนิด"], ["ratedW", "วัตต์/ข้าง"], ["subW", "ซับ (W)"], ["minImp", "โหลดต่ำสุด (Ω)"], ["vMin", "ไฟต่ำสุด (V)"], ["vMax", "ไฟสูงสุด (V)"], ["idleW", "กินไฟ idle (W)"]],
    driver: [["size", "ขนาด"], ["impedance", "อิมพีแดนซ์ (Ω)"], ["powerW", "รับกำลัง (W)"], ["sens", "ความไว (dB)"], ["qty", "ใช้ (ดอก)"]],
    tweeter: [["size", "ขนาด"], ["impedance", "อิมพีแดนซ์ (Ω)"], ["powerW", "รับกำลัง (W)"], ["sens", "ความไว (dB)"], ["qty", "ใช้ (ดอก)"]],
    subDriver: [["size", "ขนาด"], ["impedance", "อิมพีแดนซ์ (Ω)"], ["powerW", "รับกำลัง (W)"], ["sens", "ความไว (dB)"], ["qty", "ใช้ (ดอก)"]],
    battery: [["nominalV", "แรงดัน (V)"], ["mAh", "ความจุ (mAh)"]],
  }[cat.key];

  const typeLabel = { stereo: "สเตอริโอ", "2.1": "2.1 ch", mono: "โมโน", preamp: "ปรีแอมป์", none: "—" };
  const fmt = (v) => (typeLabel[v] ? typeLabel[v] : typeof v === "boolean" ? (v ? "✓ มี" : "✕ ไม่มี") : v === 0 || v === "" ? "—" : v);

  return (
    <div className="asf-scroll" style={{ overflowX: "auto", border: `1px solid ${COLORS.line}`, borderRadius: 14 }}>
      <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 560, fontSize: 13 }}>
        <thead>
          <tr style={{ background: COLORS.panel2 }}>
            <th className="asf-display" style={{ textAlign: "left", padding: "12px 14px", color: COLORS.muted, fontWeight: 600, position: "sticky", left: 0, background: COLORS.panel2 }}>รุ่น</th>
            {specKeys.map(([k, label]) => (
              <th key={k} className="asf-display" style={{ textAlign: "left", padding: "12px 14px", color: COLORS.muted, fontWeight: 600, whiteSpace: "nowrap" }}>{label}</th>
            ))}
            <th style={{ padding: "12px 14px", textAlign: "right", color: COLORS.muted }}>ราคา</th>
            <th style={{ padding: "12px 14px" }} />
          </tr>
        </thead>
        <tbody>
          {cat.list.map((opt) => {
            const active = opt.id === selectedId;
            return (
              <tr key={opt.id} style={{ borderTop: `1px solid ${COLORS.line}`, background: active ? COLORS.amber + "12" : "transparent" }}>
                <td style={{ padding: "12px 14px", fontWeight: 600, position: "sticky", left: 0, background: active ? "#241a10" : COLORS.bg }}>
                  {opt.name}
                  <div style={{ fontSize: 11, color: COLORS.muted, fontWeight: 400 }}>{opt.brand}</div>
                </td>
                {specKeys.map(([k]) => (
                  <td key={k} className="asf-mono" style={{ padding: "12px 14px", color: COLORS.text, whiteSpace: "nowrap" }}>{fmt(opt[k])}</td>
                ))}
                <td className="asf-mono" style={{ padding: "12px 14px", textAlign: "right", fontWeight: 700, color: COLORS.amber, whiteSpace: "nowrap" }}>{opt.price > 0 ? baht(opt.price) : "—"}</td>
                <td style={{ padding: "12px 14px", textAlign: "right" }}>
                  <button onClick={() => onPick(opt.id)} className="asf-display"
                    style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "7px 12px", borderRadius: 9, cursor: "pointer", fontSize: 12.5, fontWeight: 600,
                      border: "none", background: active ? COLORS.line : COLORS.amber, color: active ? COLORS.muted : "#1a1208" }}>
                    {active ? "เลือกอยู่" : "เลือก"} {!active && <ChevronRight size={14} />}
                  </button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

import { createRoot } from "react-dom/client";
createRoot(document.getElementById("root")).render(<AudioSpecForge />);
</script>
</body>
</html>
